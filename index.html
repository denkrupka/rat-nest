<script>
// ═══════════════════════════════════════════════
// LOADING SCREEN
// ═══════════════════════════════════════════════
(function() {
  const bar = document.getElementById('loading-bar');
  const screen = document.getElementById('loading-screen');

  const messages = [
    'будим крыс...',
    'варим кофе...',
    'загружаем пиццу...',
    'поднимаем прод...',
    'открываем нору...',
  ];
  let msgIdx = 0;
  const ratEl = document.getElementById('loading-rat');
  const interval = setInterval(() => {
    progress += Math.random() * 18 + 5;
    if (progress > 95) progress = 95;
    bar.style.width = progress + '%';
    if (msgIdx < messages.length) {
      ratEl.textContent = ' (\\_/)\n (•ᴗ•)\n / >🐀  ' + messages[Math.min(msgIdx, messages.length-1)];
      msgIdx++;
    }
  }, 200);
  window.addEventListener('load', () => {
    clearInterval(interval);
    bar.style.width = '100%';
    setTimeout(() => {
      screen.classList.add('fade-out');
      setTimeout(() => { screen.style.display='none'; }, 900);
    }, 400);
  });
})();

// ═══════════════════════════════════════════════
// WAVE 4 — GLOBAL STATE
// ═══════════════════════════════════════════════
let pawTrails = [];
let lastPawX = -999, lastPawY = -999;
let themeDark = (localStorage.getItem('ratTheme') !== 'light');

// ═══════════════════════════════════════════════
// CONSTANTS & LAYOUT
// ═══════════════════════════════════════════════
const WORLD_SCALE = 1.5; // масштаб мебели под размер новых крыс
const WORLD_W = 1400;
const WORLD_H = 900;  // базовая высота мира
const FLOOR_H = 32;
let cw, ch, FLOOR_Y, DEN_Y;

function oY(f) { return Math.round(FLOOR_Y * f); }
function dY(f) { return Math.round(DEN_Y + (ch - DEN_Y) * f); }
function oMid() { return Math.round(FLOOR_Y * 0.5); }
function dMid() { return Math.round(DEN_Y + (ch - DEN_Y) * 0.5); }
function oFloor() { return FLOOR_Y - 5; }
function dFloor() { return ch - 8; }

const canvas = document.getElementById('world');
const ctx = canvas.getContext('2d');
const mmCanvas = document.getElementById('minimap');
const mctx = mmCanvas.getContext('2d');

function resize() {
  cw = canvas.width = window.innerWidth;
  ch = canvas.height = window.innerHeight;
  FLOOR_Y = Math.round(WORLD_H * 0.55);
  SCALE_X = cw / WORLD_W;
  SCALE_Y = ch / WORLD_H;
  DEN_Y = FLOOR_Y + FLOOR_H;
  rebuildSpots();
}
window.addEventListener('resize', resize);

let camX = 0, targetCamX = 0, mouseClientX = 0;
let SCALE_X = 1, SCALE_Y = 1;
let tick = 0, lastTime = 0;

// ═══════════════════════════════════════════════
// STATUS DATA
// ═══════════════════════════════════════════════
let statusMap = {};
async function fetchStatus() {
  try {
    const r = await fetch('status.json?t=' + Date.now());
    const d = await r.json();
    const arr = Array.isArray(d.agents) ? d.agents : Object.values(d.agents || {});
    arr.forEach(a => {
      if (a.id) {
        const prev = statusMap[a.id];
        statusMap[a.id] = a;
        // Найди крысу с этим agentId
        const rat = rats && rats.find(r => r.agentId === a.id);
        if (rat) {
          // Если статус изменился
          if (!prev || prev.status !== a.status) {
            if (a.status === 'working') {
              // Отправить к ближайшему desk
              const deskSpots = SPOTS.filter(s => s.id.startsWith('desk'));
              const spot = deskSpots[Math.floor(Math.random() * deskSpots.length)];
              rat.tx = spot.x; rat.ty = spot.y;
              rat.currentSpot = spot;
              rat.state = 'walking';
              rat.zone = 'office';
              rat.forcedWorking = true;
            } else if (a.status === 'idle') {
              rat.forcedWorking = false;
              rat.crashed = false;
              // Пусть сам выберет спот
              rat.pickTarget();
            } else if (a.status === 'crashed') {
              rat.crashed = true;
              rat.state = 'crashed';
              rat.crashedAt = Date.now();
              rat.forcedWorking = false;
            }
          }
          // Обновить данные
          rat.task = a.task;
          rat.commits = a.commits;
          rat.workMinutes = a.workMinutes;
          rat.totalMinutes = a.totalMinutes;
        }
      }
    });
  } catch(e) {}
}
fetchStatus();
setInterval(fetchStatus, 30000);

// ═══════════════════════════════════════════════
// NIGHT MODE
// ═══════════════════════════════════════════════
function isNight() {
  const h = new Date().getUTCHours();
  return h >= 22 || h < 7;
}
function isDusk() {
  const h = new Date().getUTCHours();
  return h >= 20 || h < 9;
}

// ═══════════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════════
const toastEl = document.getElementById('toast');
let toastTimer = 0;
function showToast(msg, dur=80) {
  toastEl.textContent = msg;
  toastEl.style.display = 'block';
  toastTimer = dur;
}

// ═══════════════════════════════════════════════
// SPOTS
// ═══════════════════════════════════════════════
let SPOTS = [];
function rebuildSpots() {
  SPOTS = [
    // OFFICE (левая половина: x 0-650)
    {id:'desk1',    x:100,  zone:'office', act:'typing',   get y(){return oY(0.76);}},
    {id:'desk2',    x:200,  zone:'office', act:'typing',   get y(){return oY(0.76);}},
    {id:'desk3',    x:300,  zone:'office', act:'typing',   get y(){return oY(0.76);}},
    {id:'desk4',    x:380,  zone:'office', act:'typing',   get y(){return oY(0.76);}},
    {id:'desk5',    x:460,  zone:'office', act:'typing',   get y(){return oY(0.76);}},
    {id:'desk6',    x:540,  zone:'office', act:'typing',   get y(){return oY(0.76);}},
    {id:'desk7',    x:620,  zone:'office', act:'typing',   get y(){return oY(0.76);}},
    {id:'coffee',   x:650,  zone:'office', act:'coffee',   get y(){return oY(0.70);}},
    {id:'sprint',   x:120,  zone:'office', act:'think',    get y(){return oY(0.60);}},
    {id:'meeting',  x:80,   zone:'office', act:'think',    get y(){return oY(0.75);}},
    {id:'debug',    x:400,  zone:'office', act:'debug',    get y(){return oY(0.60);}},
    {id:'commit',   x:550,  zone:'office', act:'commit',   get y(){return oY(0.60);}},
    {id:'whiteboard',x:680, zone:'office', act:'think',    get y(){return oY(0.65);}},
    // DEN (правая половина: x 700-1400)
    {id:'bed1',     x:750,  zone:'den',    act:'sleep',    get y(){return dY(0.42);}},
    {id:'bed2',     x:790,  zone:'den',    act:'sleep',    get y(){return dY(0.42);}},
    {id:'bed3',     x:830,  zone:'den',    act:'sleep',    get y(){return dY(0.42);}},
    {id:'sofa',     x:850,  zone:'den',    act:'tv',       get y(){return dY(0.60);}},
    {id:'ps4',      x:900,  zone:'den',    act:'gaming',   get y(){return dY(0.60);}},
    {id:'fridge',   x:950,  zone:'den',    act:'eat_pizza',get y(){return dY(0.42);}},
    {id:'microwave',x:1000, zone:'den',    act:'microwave',get y(){return dY(0.42);}},
    {id:'beertbl',  x:1050, zone:'den',    act:'beer',     get y(){return dY(0.62);}},
    {id:'shower',   x:1100, zone:'den',    act:'shower',   get y(){return dY(0.42);}},
    {id:'toilet',   x:1150, zone:'den',    act:'toilet',   get y(){return dY(0.42);}},
    {id:'gym1',     x:1200, zone:'den',    act:'gym',      get y(){return dY(0.48);}},
    {id:'gym2',     x:1250, zone:'den',    act:'gym',      get y(){return dY(0.48);}},
    {id:'slot',     x:1300, zone:'den',    act:'slot',     get y(){return dY(0.52);}},
    {id:'bar',      x:1350, zone:'den',    act:'beer',     get y(){return dY(0.58);}},
    {id:'hangout',  x:1380, zone:'den',    act:'idle',     get y(){return dY(0.68);}},
  ];
}

function randSpot(zone) {
  const s = SPOTS.filter(sp => sp.zone === zone);
  return s[Math.floor(Math.random() * s.length)];
}

// ═══════════════════════════════════════════════
// CHAT BUBBLES
// ═══════════════════════════════════════════════
const CHAT_MSGS = [
  'опять прод упал 🚨', 'кто жрал мою пиццу?!', 'git push --force 😈',
  'кто писал этот код??', 'я только что починил прод', 'баг с 2018 года',
  'деплой в пятницу 💀', '// TODO: fix later', 'это не баг это фича',
  'работает? не трогай', 'где мой кофе?!', 'npm i занял час',
  'я голодный 🍕', 'по пивку? 🍺', 'когда спринт кончается?',
  'в 3 ночи всё починим', 'LGTM', 'нужен код ревью',
  '142 ошибки в билде', 'рефакторинг в эту пятницу', 'нет!!! Я сплю!!!',
  'кто взял мой чай??', 'сервер сам себя не починит', 'проверь PR плз',
  'тесты всё равно красные', 'hotfix в 23:00 🥲', 'standap через 5 минут',
];
let chatBubbles = [];
let nextChatIn = 180 + Math.random() * 300;

function spawnChat() {
  const r = rats[Math.floor(Math.random() * rats.length)];
  const msg = CHAT_MSGS[Math.floor(Math.random() * CHAT_MSGS.length)];
  chatBubbles.push({ x: r.x, y: r.y, msg, timer: 180, rat: r });
}

// ═══════════════════════════════════════════════
// INTERACTIVE OBJECTS
// ═══════════════════════════════════════════════
let microwaveTimer = 0;
let slotSpinning = false, slotTick = 0, slotReels = [0,0,0], slotWin = false;
let tvChannel = 0;
let serverBlip = [];
const SLOT_ITEMS = ['🍺','🧀','🐀','💰','⚡','🍕'];

// ═══════════════════════════════════════════════
// RAT CLASS
// ═══════════════════════════════════════════════
class Rat {
  constructor(d) {
    Object.assign(this, d);
    // Initialize status-driven fields
    const statusData = this.agentId ? (statusMap[this.agentId] || {}) : {};
    this.task = statusData.task || 'Ждёт задач';
    this.commits = statusData.commits || 0;
    this.workMinutes = statusData.workMinutes || 0;
    this.totalMinutes = statusData.totalMinutes || 0;
    this.crashed = statusData.status === 'crashed';
    this.forcedWorking = statusData.status === 'working';
    if (this.forcedWorking) this.zone = 'office';

    const sp = randSpot(this.zone) || {x: 200 + Math.random()*400, y: 200, act: 'idle'};
    this.x = sp.x + Math.random()*40-20;
    this.y = sp.y;
    this.tx = this.x; this.ty = this.y;
    this.currentSpot = sp;
    this.state = 'activity';
    this.act = sp.act;
    this.actTimer = Math.random() * 400 + 150;
    this.walkFrame = 0; this.walkTick = 0;
    this.facing = 1;
    this.trail = [];
    this.particles = [];
    this.blink = 0;

    if (this.crashed) {
      this.state = 'crashed';
    } else if (this.forcedWorking) {
      const deskSpots = SPOTS.filter(s => s.id.startsWith('desk'));
      const chosen = deskSpots[Math.floor(Math.random() * deskSpots.length)];
      if (chosen) {
        this.x = chosen.x; this.y = chosen.y;
        this.tx = chosen.x; this.ty = chosen.y;
        this.currentSpot = chosen;
        this.state = 'activity';
        this.act = 'typing';
      }
    }
  }

  pickTarget() {
    // Если крыса принудительно работает — остаётся за desk
    if (this.forcedWorking) {
      const deskSpots = SPOTS.filter(s => s.id.startsWith('desk'));
      const sp = deskSpots[Math.floor(Math.random() * deskSpots.length)];
      if (sp) {
        this.tx = sp.x; this.ty = sp.y;
        this.currentSpot = sp;
        this.act = 'typing';
        this.actTimer = 300 + Math.random() * 400;
      }
      return;
    }
    const sp = randSpot(this.zone);
    this.tx = sp.x + Math.random()*20-10;
    this.ty = sp.y;
    this.currentSpot = sp;
    this.state = 'walking';
    this.actTimer = 220 + Math.random() * 450;
  }

  update(dt) {
    this.blink = Math.max(0, this.blink - dt*60);
    // Crashed крысы не двигаются
    if (this.state === 'crashed') {
      this.particles = this.particles.filter(p => p.life > 0);
      this.particles.forEach(p => {
        p.x += p.vx * dt*60; p.y += p.vy * dt*60;
        p.vy += 0.06 * dt*60; p.life -= dt*60;
      });
      return;
    }
    if (this.state === 'walking') {
      const dx = this.tx - this.x, dy = this.ty - this.y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist < 3) {
        this.x = this.tx; this.y = this.ty;
        this.state = 'activity';
        this.act = this.currentSpot ? this.currentSpot.act : 'idle';
      } else {
        const s = this.spd * dt * 60;
        this.facing = dx >= 0 ? 1 : -1;
        this.x += (dx/dist)*s; this.y += (dy/dist)*s;
        this.walkTick += s * 0.22;
        this.walkFrame = Math.floor(this.walkTick % 4);
        if (this.blur) {
          this.trail.unshift({x:this.x, y:this.y});
          if (this.trail.length > 8) this.trail.pop();
        }
      }
    } else {
      this.trail = [];
      this.actTimer -= dt * 60;
      if (this.actTimer <= 0) this.pickTarget();
    }
    this.particles = this.particles.filter(p => p.life > 0);
    this.particles.forEach(p => {
      p.x += p.vx * dt*60; p.y += p.vy * dt*60;
      p.vy += 0.06 * dt*60; p.life -= dt*60;
    });
  }

  addConfetti() {
    for (let i = 0; i < 16; i++) {
      this.particles.push({
        x:this.x, y:this.y-24,
        vx:(Math.random()-0.5)*3.5, vy:-Math.random()*3-1.5,
        color:['#ff4','#f4f','#4ff','#f84','#8f4','#ff8'][Math.floor(Math.random()*6)],
        life:80, size:3+Math.random()*3, isRect:true
      });
    }
  }

  addHeart() {
    this.particles.push({
      x:this.x + Math.random()*36-18, y:this.y-32-Math.random()*10,
      vx:(Math.random()-0.5)*0.8, vy:-0.7-Math.random()*0.5,
      color:'#ff6699', life:90, size:12, isHeart:true
    });
  }

  addWater() {
    for (let i = 0; i < 3; i++) {
      this.particles.push({
        x:this.x+Math.random()*18-9, y:this.y-12+Math.random()*8,
        vx:(Math.random()-0.5)*1.8, vy:-Math.random()*2-0.5,
        color:'#88ccff', life:22, size:2, isRect:true
      });
    }
  }
}

// AMBULANCE SYSTEM
// ═══════════════════════════════════════════════
const Ambulance = {
  active: false,
  x: -200,
  y: 0,
  targetX: 0,
  targetRat: null,
  state: 'idle', // idle | arriving | treating | leaving
  speed: 4,
  treatTimer: 0,
  treatDuration: 300,
  siren: false,
  sirenTick: 0,

  call(rat) {
    if (this.active) return;
    this.active = true;
    this.targetRat = rat;
    this.x = -150;
    this.y = rat.y;
    this.targetX = rat.x - 80;
    this.state = 'arriving';
    this.siren = true;
  },

  update() {
    if (!this.active) return;
    this.sirenTick++;

    if (this.state === 'arriving') {
      const dx = this.targetX - this.x;
      if (Math.abs(dx) < 5) {
        this.x = this.targetX;
        this.state = 'treating';
        this.treatTimer = 0;
      } else {
        this.x += Math.sign(dx) * this.speed;
      }
    }

    if (this.state === 'treating') {
      this.treatTimer++;
      if (this.targetRat) {
        const statusData = statusMap[this.targetRat.agentId];
        if (statusData && statusData.status !== 'crashed') {
          this.targetRat.crashed = false;
          this.targetRat.state = 'activity';
          this.targetRat.act = 'idle';
          this.state = 'leaving';
          this.siren = false;
          showToast('💉 ' + this.targetRat.name + ' реанимирован!', 120);
        }
      }
    }

    if (this.state === 'leaving') {
      this.x -= this.speed * 0.7;
      if (this.x < -200) {
        this.active = false;
        this.state = 'idle';
        this.targetRat = null;
      }
    }
  },

  draw() {
    if (!this.active) return;
    const cx = px(this.x), cy = this.y;

    ctx.save();

    // Корпус
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(cx - 50, cy - 25, 80, 35);

    // Кабина
    ctx.fillStyle = '#ddddff';
    ctx.fillRect(cx + 20, cy - 25, 20, 28);

    // Колёса
    ctx.fillStyle = '#222';
    ctx.beginPath(); ctx.arc(cx - 30, cy + 12, 8, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx + 25, cy + 12, 8, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#555';
    ctx.beginPath(); ctx.arc(cx - 30, cy + 12, 4, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx + 25, cy + 12, 4, 0, Math.PI*2); ctx.fill();

    // Красный крест
    ctx.fillStyle = '#ff2244';
    ctx.fillRect(cx - 20, cy - 18, 6, 20);
    ctx.fillRect(cx - 26, cy - 12, 18, 6);

    // Сирена (мигающая)
    const sirenOn = Math.floor(this.sirenTick / 8) % 2 === 0;
    ctx.fillStyle = sirenOn ? '#ff4400' : '#0044ff';
    ctx.beginPath(); ctx.arc(cx - 15, cy - 28, 6, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = sirenOn ? '#0044ff' : '#ff4400';
    ctx.beginPath(); ctx.arc(cx - 2, cy - 28, 6, 0, Math.PI*2); ctx.fill();

    // Treating — ореол и прогресс
    if (this.state === 'treating' && this.targetRat) {
      const rx = px(this.targetRat.x);
      const ry = this.targetRat.y;

      const pulse = 0.5 + 0.5 * Math.sin(this.sirenTick * 0.15);
      ctx.strokeStyle = `rgba(255,50,50,${pulse})`;
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.arc(rx, ry, 40 + pulse * 10, 0, Math.PI*2);
      ctx.stroke();

      ctx.fillStyle = '#ff4444';
      ctx.font = 'bold 11px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('⚡ РЕАНИМАЦИЯ...', rx, ry - 55);

      const prog = (this.treatTimer % 120) / 120;
      ctx.fillStyle = '#111';
      ctx.fillRect(rx - 40, ry - 45, 80, 6);
      ctx.fillStyle = '#ff4444';
      ctx.fillRect(rx - 40, ry - 45, 80 * prog, 6);
    }

    ctx.restore();
  }
};

// ═══════════════════════════════════════════════
// DRAW HELPERS
// ═══════════════════════════════════════════════
function px(x) { return x; }

function fr(x,y,w,h,c) { ctx.fillStyle=c; ctx.fillRect(px(x),y,w,h); }
function sr(x,y,w,h,c,lw=1) { ctx.strokeStyle=c; ctx.lineWidth=lw; ctx.strokeRect(px(x)+0.5,y+0.5,w-1,h-1); }
function tx(t,x,y,c,sz=10,al='left') { ctx.fillStyle=c; ctx.font=sz+'px monospace'; ctx.textAlign=al; ctx.fillText(t,px(x),y); ctx.textAlign='left'; }
function em(e,x,y,sz=14) { ctx.font=sz+'px serif'; ctx.fillText(e,px(x),y); }

function roundRect(x, y, w, h, r, fill, stroke) {
  const rx = px(x);
  ctx.beginPath();
  ctx.moveTo(rx+r, y);
  ctx.lineTo(rx+w-r, y);
  ctx.quadraticCurveTo(rx+w, y, rx+w, y+r);
  ctx.lineTo(rx+w, y+h-r);
  ctx.quadraticCurveTo(rx+w, y+h, rx+w-r, y+h);
  ctx.lineTo(rx+r, y+h);
  ctx.quadraticCurveTo(rx, y+h, rx, y+h-r);
  ctx.lineTo(rx, y+r);
  ctx.quadraticCurveTo(rx, y, rx+r, y);
  ctx.closePath();
  if(fill) { ctx.fillStyle=fill; ctx.fill(); }
  if(stroke) { ctx.strokeStyle=stroke; ctx.lineWidth=1.5; ctx.stroke(); }
}

// ═══════════════════════════════════════════════
// BACKGROUND
// ═══════════════════════════════════════════════
function drawBG() {
  ctx.fillStyle='#050508';
  ctx.fillRect(0,0,WORLD_W,WORLD_H);

  const night = isNight();
  const dusk = isDusk();

  // ── OFFICE TOP ──
  // Office background
  const offBg = night ? '#050510' : '#080812';
  ctx.fillStyle=offBg;
  ctx.fillRect(0,0,WORLD_W,FLOOR_Y);

  // Office floor grid
  ctx.strokeStyle = night ? '#0a0a1e' : '#0d0d20';
  ctx.lineWidth = 1;
  for(let x=0;x<WORLD_W;x+=44){
    ctx.beginPath(); ctx.moveTo(px(x),0); ctx.lineTo(px(x),FLOOR_Y); ctx.stroke();
  }
  for(let y=0;y<FLOOR_Y;y+=44){
    ctx.beginPath(); ctx.moveTo(px(0),y); ctx.lineTo(px(WORLD_W),y); ctx.stroke();
  }

  // Office ambient glow (multiple light sources = ceiling lights)
  for(let lx=200; lx<WORLD_W; lx+=400) {
    const flickerAlpha = night ? 0.03 : 0.05 + Math.sin(tick*0.02+lx)*0.01;
    const g=ctx.createRadialGradient(px(lx),0,10,px(lx),0,FLOOR_Y*0.8);
    g.addColorStop(0,`rgba(${night?'30,50,120':'180,200,255'},${flickerAlpha*2})`);
    g.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=g; ctx.fillRect(px(0),0,WORLD_W,FLOOR_Y);
  }

  // Ceiling vents and cables
  ctx.strokeStyle='#0c0c20'; ctx.lineWidth=3;
  for(let x=0;x<WORLD_W;x+=600){
    ctx.beginPath(); ctx.moveTo(px(x+50),0); ctx.lineTo(px(x+50),40); ctx.stroke();
    fr(x+30,0,40,18,'#0c0c1e'); sr(x+30,0,40,18,'#161630',1);
  }

  // Office ceiling light fixtures
  for(let lx=200; lx<WORLD_W; lx+=380) {
    const flicker = night ? 0 : (0.7 + Math.sin(tick*0.031+lx*0.01)*0.15);
    fr(lx-30, 0, 60, 8, '#111122');
    if(!night) {
      ctx.shadowColor=`rgba(200,220,255,${flicker})`;
      ctx.shadowBlur=20;
      fr(lx-22, 5, 44, 3, `rgba(220,240,255,${flicker*0.9})`);
      ctx.shadowBlur=0;
    }
  }

  // ── FLOOR DIVIDER ──
  // Main floor planks
  const planks = ['#1a0e06','#1e1108','#1c0f07','#200d05','#1a1005'];
  for(let x=0; x<WORLD_W; x+=220) {
    fr(x, FLOOR_Y, 218, FLOOR_H, planks[Math.floor(x/220)%planks.length]);
    sr(x, FLOOR_Y, 218, FLOOR_H, '#2a1508', 1);
    // Wood grain
    ctx.strokeStyle='rgba(0,0,0,0.25)'; ctx.lineWidth=1;
    for(let g=3;g<FLOOR_H-3;g+=8){
      ctx.beginPath(); ctx.moveTo(px(x+2),FLOOR_Y+g); ctx.lineTo(px(x+216),FLOOR_Y+g); ctx.stroke();
    }
  }

  // Tunnel holes in floor
  TUNNELS.forEach(tx2 => {
    // Hole shadow
    const hg = ctx.createRadialGradient(px(tx2+22),FLOOR_Y+FLOOR_H/2,5,px(tx2+22),FLOOR_Y+FLOOR_H/2,40);
    hg.addColorStop(0,'rgba(0,0,0,0.9)');
    hg.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=hg; ctx.fillRect(px(tx2-20),FLOOR_Y-4,84,FLOOR_H+12);
    // Dark hole
    roundRect(tx2, FLOOR_Y, 44, FLOOR_H, 4, '#030303', '#1a0a00');
    // Rope ladder
    ctx.strokeStyle='#5a3010'; ctx.lineWidth=2;
    for(let step=0;step<5;step++){
      const sy=FLOOR_Y+step*(FLOOR_H/4)+4;
      ctx.beginPath(); ctx.moveTo(px(tx2+8),sy); ctx.lineTo(px(tx2+36),sy); ctx.stroke();
    }
    ctx.strokeStyle='#4a2808'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(px(tx2+8),FLOOR_Y-20); ctx.lineTo(px(tx2+8),FLOOR_Y+FLOOR_H+30); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(px(tx2+36),FLOOR_Y-20); ctx.lineTo(px(tx2+36),FLOOR_Y+FLOOR_H+30); ctx.stroke();
    // Labels
    ctx.fillStyle='#2a1500'; ctx.font='8px monospace';
    ctx.fillText('НОРА▼',px(tx2-2),FLOOR_Y-4);
  });

  // Pipes running through floor
  ctx.strokeStyle='#2a1800'; ctx.lineWidth=6;
  ctx.beginPath(); ctx.moveTo(px(450),FLOOR_Y+6); ctx.lineTo(px(800),FLOOR_Y+6); ctx.stroke();
  ctx.strokeStyle='#3a2810'; ctx.lineWidth=3;
  ctx.beginPath(); ctx.moveTo(px(450),FLOOR_Y+6); ctx.lineTo(px(800),FLOOR_Y+6); ctx.stroke();

  ctx.strokeStyle='#1a1428'; ctx.lineWidth=6;
  ctx.beginPath(); ctx.moveTo(px(1500),FLOOR_Y+16); ctx.lineTo(px(2000),FLOOR_Y+16); ctx.stroke();

  // ── DEN BOTTOM ──
  // Den background - earthy underground
  const denGrad = ctx.createLinearGradient(0, DEN_Y, 0, ch);
  if(night) {
    denGrad.addColorStop(0,'#0e0804');
    denGrad.addColorStop(1,'#070402');
  } else {
    denGrad.addColorStop(0,'#180d06');
    denGrad.addColorStop(1,'#0e0804');
  }
  ctx.fillStyle=denGrad;
  ctx.fillRect(0, DEN_Y, WORLD_W, WORLD_H-DEN_Y);

  // Earth texture
  ctx.strokeStyle = night ? '#120a04' : '#1a1006';
  ctx.lineWidth=1;
  for(let x=0;x<WORLD_W;x+=70) {
    for(let y=DEN_Y;y<ch;y+=35){
      const off=(Math.floor(x/70)%2)*35;
      ctx.strokeRect(px(x),y+off,68,33);
    }
  }

  // Den warm ambient glow
  for(let lx=300; lx<WORLD_W; lx+=600) {
    const g2=ctx.createRadialGradient(px(lx),dMid(),30,px(lx),dMid(),280);
    g2.addColorStop(0,`rgba(${night?'80,30,0':'160,80,10'},${night?0.06:0.08})`);
    g2.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=g2; ctx.fillRect(0,DEN_Y,WORLD_W,WORLD_H-DEN_Y);
  }

  // Den ceiling stalactites / roots
  for(let rx=50;rx<WORLD_W;rx+=130+Math.sin(rx)*40) {
    const rootLen = 15 + Math.sin(rx*0.1)*12;
    ctx.strokeStyle=`rgba(${night?'50,30,10':'80,50,20'},0.6)`;
    ctx.lineWidth=1+Math.random();
    ctx.beginPath();
    ctx.moveTo(px(rx), DEN_Y);
    ctx.bezierCurveTo(
      px(rx-6), DEN_Y+rootLen*0.4,
      px(rx+4), DEN_Y+rootLen*0.7,
      px(rx+Math.sin(rx)*3), DEN_Y+rootLen
    );
    ctx.stroke();
  }

  // Horizontal pipes on den ceiling
  const PIPE_COLORS=['#2a1800','#1a1428','#2a1420'];

function cobweb(x,y) {
  ctx.strokeStyle='rgba(180,180,180,0.15)'; ctx.lineWidth=0.5;
  for(let i=0;i<5;i++){
    ctx.beginPath(); ctx.moveTo(px(x),y);
    ctx.lineTo(px(x+42*Math.cos(i*0.55)),y+42*Math.sin(i*0.55)); ctx.stroke();
  }
  for(let r=8;r<=42;r+=10){
    ctx.beginPath();
    for(let a=0;a<=Math.PI*2;a+=0.35){
      const cx2=x+r*Math.cos(a),cy2=y+r*Math.sin(a);
      a===0?ctx.moveTo(px(cx2),cy2):ctx.lineTo(px(cx2),cy2);
    } ctx.stroke();
  }
}

    ctx.beginPath(); ctx.arc(px(x+r), y+r, r*(i+1)/5, 0, Math.PI*2); ctx.fill();
  }
  // Bullseye
  ctx.fillStyle='#ff2222';
  ctx.beginPath(); ctx.arc(px(x+r), y+r, r*0.15, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle='#cc0000';

  // Sector lines
  ctx.strokeStyle='rgba(255,255,255,0.2)'; ctx.lineWidth=0.5;
  for(let s=0;s<10;s++) {
    const a=s*Math.PI/5;
    ctx.beginPath(); ctx.moveTo(px(x+r),y+r);
    ctx.lineTo(px(x+r+r*Math.cos(a)), y+r+r*Math.sin(a)); ctx.stroke();
  }
  // Numbers
  ctx.fillStyle='rgba(255,255,255,0.7)'; ctx.font='5px monospace'; ctx.textAlign='center';
  const nums=[20,1,18,4,13,6,10,15,2,17,3,19,7,16,8,11,14,9,12,5];
  nums.forEach((n, i) => {
    const a=i*Math.PI/10 - Math.PI/2;
    ctx.fillText(n, px(x+r+r*0.88*Math.cos(a)), y+r+r*0.88*Math.sin(a)+2);
  });
  ctx.textAlign='left';
  // Darts on board (3 darts)
  const dartPositions = [{dx:-8,dy:-12},{dx:5,dy:8},{dx:12,dy:-4}];
  dartPositions.forEach(d => {
    ctx.strokeStyle='#888'; ctx.lineWidth=1.5;

}

function drawDiscoLights(x, y) {
  // Rotating disco lights from ceiling
  const DISCO_COLORS = ['#ff2244','#22ffaa','#4488ff','#ffcc00','#ff44ff','#44ffff'];
  for(let d=0;d<4;d++) {
    const angle = tick * 0.04 + d * (Math.PI/2);
    const beatPulse = 0.5+Math.sin(tick*0.12)*0.3;
    const col = DISCO_COLORS[(Math.floor(tick/20)+d)%DISCO_COLORS.length];
    const lightX = x + 20 + d*38;
    const lightY = y + 8;
    // Spotlight beam
    ctx.save();
    ctx.globalAlpha=0.12*beatPulse;
    const beamLen = (ch-y)*0.7;
    const beamAngle = angle;
    const endX = lightX + Math.sin(beamAngle)*beamLen;
    const endY = lightY + Math.abs(Math.cos(beamAngle))*beamLen*0.8;
    const grad = ctx.createConicalGradient ? null : null;
    ctx.fillStyle=col;
    ctx.beginPath();
    ctx.moveTo(px(lightX), lightY);
    ctx.lineTo(px(endX-12), endY);
    ctx.lineTo(px(endX+12), endY);
    ctx.closePath(); ctx.fill();
    ctx.restore();
    // Disco ball dot on ceiling
    ctx.fillStyle=col; ctx.shadowColor=col; ctx.shadowBlur=8*beatPulse;
    ctx.beginPath(); ctx.arc(px(lightX), lightY, 4, 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur=0;
  }
  // Disco ball
  const dbx = x+80, dby = y+12;
  fr(dbx-1, y, 2, 16, '#555');
  for(let r=0;r<5;r++) for(let c=0;c<5;c++) {
    const angle = tick*0.06+r*0.8+c*0.6;

    ctx.fillStyle=col2;
    ctx.fillRect(px(dbx-10+c*5), dby-10+r*5, 4, 4);
  }
  ctx.strokeStyle='rgba(200,200,200,0.3)'; ctx.lineWidth=0.5;
  ctx.beginPath(); ctx.arc(px(dbx), dby, 12, 0, Math.PI*2); ctx.stroke();
}

function drawOfficeWindows() {
  const night = isNight();
  const dusk = isDusk();
  const WINDOW_XS = [340, 740, 1120, 1500, 1900, 2280, 2660, 3020];
  WINDOW_XS.forEach((wx2, i) => {
    const wy = 10, ww = 88, wh = Math.round(FLOOR_Y * 0.38);
    // Window frame
    fr(wx2, wy, ww, wh, '#0d0d1e'); sr(wx2, wy, ww, wh, '#1e2e4a', 2);
    // Sky
    let skyTop, skyBot;
    if(night) {
      skyTop='#020410'; skyBot='#050818';
    } else if(dusk) {
      skyTop='#1a0a28'; skyBot='#2a1840';
    } else {
      skyTop='#0a1828'; skyBot='#102040';
    }
    const skyG = ctx.createLinearGradient(0, wy+2, 0, wy+wh-2);
    skyG.addColorStop(0, skyTop); skyG.addColorStop(1, skyBot);
    ctx.fillStyle=skyG; ctx.fillRect(px(wx2+2),wy+2,ww-4,wh-4);
    // Buildings silhouette
    ctx.fillStyle = night ? '#030308' : '#060614';
    const bldH = [wh*0.35, wh*0.5, wh*0.28, wh*0.44, wh*0.32];
    let bx=4;
    for(let b=0;b<5;b++){
      const bh2=bldH[(i+b)%5];
      ctx.fillRect(px(wx2+bx), wy+wh-bh2, 14, bh2);
      // Building windows
      if(night) {
        for(let wr=0;wr<Math.floor(bh2/8)-1;wr++) {
          for(let wc=0;wc<2;wc++) {
            const on = (tick + i*7 + b*13 + wr*3 + wc*5) % 120 > 20;
            ctx.fillStyle=on?'rgba(255,220,80,0.8)':'rgba(0,0,0,0)';
            ctx.fillRect(px(wx2+bx+2+wc*6), wy+wh-bh2+wr*8+3, 4, 4);
          }
        }
      }
      bx += 16 + (b%2)*2;
    }
    // Moon / sun
    if(night) {
      ctx.fillStyle='rgba(220,230,255,0.5)';
      ctx.beginPath(); ctx.arc(px(wx2+ww*0.75), wy+wh*0.2, 7, 0, Math.PI*2); ctx.fill();
    } else {
      ctx.fillStyle='rgba(255,200,50,0.3)';
      ctx.beginPath(); ctx.arc(px(wx2+ww*0.75), wy+wh*0.2, 9, 0, Math.PI*2); ctx.fill();
    }
    // Stars in night windows
    if(night) {
      for(let s=0;s<5;s++) {
        const sa=0.4+Math.sin(tick*0.05+i*3+s)*0.3;
        ctx.fillStyle=`rgba(255,255,255,${sa*0.6})`;
        const stx=wx2+8+s*14+(Math.sin(i+s)*6), sty=wy+6+s*5;
        ctx.beginPath(); ctx.arc(px(stx), sty, 0.8, 0, Math.PI*2); ctx.fill();
      }
    }
    // Rain if raining (periodic)
    if(Math.floor(tick/1200)%3===0) {
      ctx.strokeStyle='rgba(100,180,255,0.4)'; ctx.lineWidth=0.5;
      for(let r=0;r<4;r++){
        const ry=(tick*2+r*18)%(wh-4)+wy+2;
        const rxp=wx2+10+r*20;
        ctx.beginPath(); ctx.moveTo(px(rxp),ry); ctx.lineTo(px(rxp-2),ry+7); ctx.stroke();
      }
    }
    // Frame separator
    ctx.strokeStyle='#1a2a40'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(px(wx2+ww/2),wy+2); ctx.lineTo(px(wx2+ww/2),wy+wh-2); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(px(wx2+2),wy+wh*0.5); ctx.lineTo(px(wx2+ww-2),wy+wh*0.5); ctx.stroke();
  });
}

function drawCeilingFans() {
  const FAN_XS = [240, 640, 1040, 1440, 1840, 2240, 2640, 3040];
  FAN_XS.forEach((fx, i) => {

    ctx.arc(px(fx), fy, 3, 0, Math.PI*2); ctx.fill();
    // Wire
    ctx.strokeStyle='#1a1a30'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(px(fx),0); ctx.lineTo(px(fx),fy-8); ctx.stroke();

function drawDeadlineCounter(x, y) {
  const now = new Date();
  const nextFriday = new Date(now);
  nextFriday.setDate(now.getDate() + (5 - now.getDay() + 7) % 7 || 7);
  nextFriday.setHours(23,59,59,0);
  const msLeft = nextFriday - now;
  const h = Math.floor(msLeft/3600000);
  const m = Math.floor((msLeft%3600000)/60000);
  const s = Math.floor((msLeft%60000)/1000);
  const urgent = h < 24;
  const w=160, ht=36;
  fr(x, y, w, ht, urgent?'#200000':'#0a0a1a');
  sr(x, y, w, ht, urgent?'#cc0000':'#1a2a4a', 1);
  tx('ДЕДЛАЙН ДО ПЯТНИЦЫ', x+6, y+11, urgent?'#ff4444':'#3366aa', 7);
  const timeStr = h.toString().padStart(2,'0')+':'+m.toString().padStart(2,'0')+':'+s.toString().padStart(2,'0');
  ctx.fillStyle=urgent?`rgba(255,50,50,${0.8+Math.sin(tick*0.15)*0.2})`:'#44aaff';
  ctx.font='bold 13px monospace';
  ctx.fillText(timeStr, px(x+18), y+ht-6);
  if(urgent && Math.floor(tick/15)%2===0) {
    ctx.fillStyle='#ff2222'; ctx.font='8px monospace';
    ctx.fillText('⚠️ СКОРО!!!', px(x+w-70), y+ht-8);
  }
}

function drawCalendar(x, y) {
  const w=56, h=64;

  fr(x, y, w, 18, '#cc2222'); tx('МАРТ', x+14, y+13, '#fff', 9);

  fr(x+16, y-4, 5, 8, '#888'); fr(x+32, y-4, 5, 8, '#888');
  // Days grid
  ctx.font='6px monospace';
  const days=['Пн','Вт','Ср','Чт','Пт','Сб','Вс'];
  days.forEach((d,i) => {
    ctx.fillStyle='#666';
    ctx.fillText(d, px(x+3+i*8), y+28);
  });
  const today = new Date().getDate();
  for(let d=1;d<=31;d++) {
    const row=Math.floor((d-1)/7), col=(d-1)%7;

    ctx.fillText(d.toString(), px(dx), dy2);

  em('💀', x+38, y+54, 8);
}

  // Frame
  fr(x-4, y-4, w+8, h+8, '#111');
  fr(x+2, y+2, w-4, h-4, '#050510');
  // Text
  ctx.fillStyle='rgba(255,200,0,0.9)'; ctx.font='bold 7px monospace'; ctx.textAlign='center';
  ctx.fillText('WORK', px(x+w/2), y+18);
  ctx.fillText('HARDER', px(x+w/2), y+26);
  ctx.fillStyle='rgba(200,200,200,0.4)'; ctx.font='6px serif';
  ctx.fillText('— Boss', px(x+w/2), y+36);
  // Small icon
  ctx.font='22px serif'; ctx.fillText('💼', px(x+w/2-12), y+h-20);
  ctx.fillStyle='rgba(255,100,0,0.6)'; ctx.font='6px monospace';
  ctx.fillText('or die trying', px(x+w/2), y+h-6);
  ctx.textAlign='left';
}

function drawWhiteboard(x, y) {
  const w=160, h=Math.min(FLOOR_Y*0.44, 160);
  fr(x, y, w, h, '#f5f5f0'); sr(x, y, w, h, '#888', 3);
  // Whiteboard frame
  fr(x-6, y-6, w+12, 12, '#666');
  fr(x-6, y+h-2, w+12, 12, '#666');
  // Content
  ctx.fillStyle='#cc2222'; ctx.font='8px monospace';
  ctx.fillText('АРХИТЕКТУРА v3', px(x+8), y+16);
  ctx.strokeStyle='#4444cc'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(px(x+12),y+28); ctx.lineTo(px(x+60),y+28);
  ctx.lineTo(px(x+60),y+60); ctx.lineTo(px(x+110),y+60); ctx.stroke();
  ctx.fillStyle='#2222cc'; ctx.font='6px monospace';
  ctx.fillText('Frontend',px(x+6),y+46); ctx.fillText('Backend',px(x+64),y+74); ctx.fillText('DB',px(x+118),y+52);
  // Boxes
  sr(x+4, y+24, 52, 28, '#2244aa', 1.5);
  sr(x+56, y+48, 52, 28, '#2244aa', 1.5);
  sr(x+112, y+36, 42, 28, '#2244aa', 1.5);
  // Messy notes
  ctx.fillStyle='#cc4400'; ctx.font='7px monospace';
  ctx.fillText('TODO: всё', px(x+8), y+h-22);
  ctx.fillText('DEADLINE: ВЧЕРА', px(x+8), y+h-12);
  // Marker at the base
  fr(x+w-28, y+h+2, 24, 8, '#cc2222'); fr(x+w-30, y+h+2, 4, 8, '#aaaaaa');
}

// ═══════════════════════════════════════════════
// RAT BODY DRAWING
// ═══════════════════════════════════════════════
function drawRatBody(ox, oy, bw, bh, fur, belly, fat, crown, heart) {
  const xw=fat?bw*0.3:0, xh=fat?bh*0.25:0;
  const w=bw+xw, h=bh+xh;

  // Tail
  ctx.strokeStyle=fur; ctx.lineWidth=Math.max(1.5,h*0.11);
  ctx.beginPath();
  ctx.moveTo(ox-w/2+2, oy+h*0.3);
  ctx.bezierCurveTo(ox-w, oy+h*0.6, ox-w*1.4, oy+h*0.9, ox-w*1.1, oy+h*1.15);
  ctx.stroke();

  // Body
  ctx.fillStyle=fur;
  ctx.beginPath();
  ctx.ellipse(ox, oy, w/2, h/2, 0, 0, Math.PI*2);
  ctx.fill();

  // Belly
  ctx.fillStyle=belly;
  ctx.beginPath();
  ctx.ellipse(ox+w*0.05, oy+h*0.05, w*0.28, h*0.28, 0, 0, Math.PI*2);
  ctx.fill();

  // Head
  const hx=ox+w*0.46, hr=h*0.46;
  ctx.fillStyle=fur;
  ctx.beginPath();
  ctx.arc(hx, oy-h*0.06, hr, 0, Math.PI*2);
  ctx.fill();

  // Snout
  ctx.fillStyle=belly;
  ctx.beginPath();
  ctx.ellipse(hx+hr*0.72, oy-h*0.06, hr*0.42, hr*0.3, 0, 0, Math.PI*2);
  ctx.fill();

  // Nose
  ctx.fillStyle='#ff8888';
  ctx.beginPath();
  ctx.arc(hx+hr*0.97, oy-h*0.06, hr*0.12, 0, Math.PI*2);
  ctx.fill();

  // Eye
  ctx.fillStyle='#111';
  ctx.beginPath();
  ctx.arc(hx+hr*0.3, oy-h*0.28, hr*0.13, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle='#fff';
  ctx.beginPath();
  ctx.arc(hx+hr*0.34, oy-h*0.3, hr*0.055, 0, Math.PI*2);
  ctx.fill();

  // Ear
  ctx.fillStyle=fur;
  ctx.beginPath();
  ctx.arc(hx-hr*0.1, oy-h*0.5-hr*0.32, hr*0.28, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle='#e08888';
  ctx.beginPath();
  ctx.arc(hx-hr*0.1, oy-h*0.5-hr*0.32, hr*0.16, 0, Math.PI*2);
  ctx.fill();

  // Crown for Шнырь
  if(crown) {
    ctx.fillStyle='#ffcc00';
    ctx.beginPath();
    const cx2=hx-hr*0.1, cy2=oy-h*0.5-hr*0.62;
    ctx.moveTo(cx2-hr*0.5, cy2);
    ctx.lineTo(cx2-hr*0.38, cy2-hr*0.52);
    ctx.lineTo(cx2-hr*0.08, cy2-hr*0.3);
    ctx.lineTo(cx2+hr*0.22, cy2-hr*0.56);
    ctx.lineTo(cx2+hr*0.5, cy2-hr*0.08);
    ctx.lineTo(cx2+hr*0.5, cy2);
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle='#ff9900'; ctx.lineWidth=0.5; ctx.stroke();
    ctx.fillStyle='#ff2244';
    ctx.beginPath();
    ctx.arc(cx2-hr*0.08, cy2-hr*0.4, hr*0.09, 0, Math.PI*2);
    ctx.fill();
  }

  // Heart
  if(heart) {
    ctx.font=(h*0.55)+'px serif';
    ctx.fillText('💕', ox+w*0.1, oy-h*0.72);
  }
}

function drawCrashedRat(rat) {
  // Legacy wrapper - handled by drawCyberMouse now
  drawRat(rat);
}

// ════════════════════════════════════════════════════
// CYBER MOUSE v2 — Bipedal Humanoid Rat Drawing Engine
// ════════════════════════════════════════════════════

const CYBER_SCHEMES = {
  'shnyr':    { body:'#1a2faa', armor:'#2244cc', eyeColor:'#ffee44', glowColor:'#5577ff', accent:'#ffcc00', tailColor:'#0033bb' },
  'kodogryz': { body:'#aa2200', armor:'#cc3300', eyeColor:'#ff9900', glowColor:'#ff5500', accent:'#ff8844', tailColor:'#881100' },
  'miron':    { body:'#115500', armor:'#1a8822', eyeColor:'#88ff44', glowColor:'#44ff88', accent:'#00ffaa', tailColor:'#114400' },
  'zhirobas': { body:'#3a3a4a', armor:'#555566', eyeColor:'#cccccc', glowColor:'#888899', accent:'#aaaaaa', tailColor:'#222233' },
  'shustrik': { body:'#997700', armor:'#ccaa00', eyeColor:'#ffffff', glowColor:'#ffff44', accent:'#ffee44', tailColor:'#aa9900' },
  'skolzkiy': { body:'#551188', armor:'#7722bb', eyeColor:'#ff44ff', glowColor:'#aa44ff', accent:'#dd66ff', tailColor:'#440077' },
  'tykovka':  { body:'#994400', armor:'#cc6600', eyeColor:'#44ddff', glowColor:'#ff8800', accent:'#ffaa55', tailColor:'#773300' },
  'xrustik':  { body:'#6B3010', armor:'#8B4513', eyeColor:'#ffcc66', glowColor:'#cc8833', accent:'#dd9944', tailColor:'#5a2808' },
};

function getCyberScheme(rat) {
  return CYBER_SCHEMES[rat.id] || { body:'#334466', armor:'#445577', eyeColor:'#88aaff', glowColor:'#4466cc', accent:'#6688cc', tailColor:'#223355' };
}

function drawCyberMouse(ox, oy, rat, tickVal) {
  const sz = rat.sz || 1;
  const s = sz;
  const state = rat.state || 'activity';
  const act = rat.act || 'idle';
  const fat = rat.fat || false;
  const sc = getCyberScheme(rat);
  const isCrashed = rat.crashed || false;
  const walkFrame = rat.walkFrame || 0;
  const fw = fat ? 1.4 : 1.0;

  // Key measurements at sz=1: total ~70px tall
  const legH   = 16 * s;
  const legW   = 5.5 * s * fw;
  const torsoW = 22 * s * fw;
  const torsoH = 24 * s;
  const headR  = 13 * s * (fat ? 1.15 : 1.0);
  const armL   = 12 * s;
  const armW   = 4.5 * s;

  // Vertical anchors (feet near oy+5)
  const feetY  = oy + 5 * s;
  const hipsY  = feetY - legH;
  const torsoB = hipsY;
  const torsoT = torsoB - torsoH;
  const headCY = torsoT - headR * 0.4;

  // Walk bob & swing
  let bodyBob = 0, bodySwing = 0;
  if (state === 'walking') {
    const ph = (walkFrame % 4) / 4 * Math.PI * 2;
    bodyBob   = Math.abs(Math.sin(ph)) * 2.5 * s;
    bodySwing = Math.sin(ph) * 2 * s;
  }

  // === CRASHED: lay sideways ===
  if (isCrashed) {
    ctx.save();
    ctx.translate(ox, oy);
    ctx.rotate(Math.PI / 2);
    // Red flickering halo
    const flickAlpha = 0.3 + Math.sin(tickVal * 0.2) * 0.25;
    ctx.shadowColor = '#ff0000';
    ctx.shadowBlur = 20 + Math.sin(tickVal * 0.15) * 10;
    ctx.strokeStyle = `rgba(255,50,50,${flickAlpha})`;
    ctx.lineWidth = 8 * s;
    ctx.beginPath();
    ctx.arc(0, 0, headR * 2.2, 0, Math.PI * 2);
    ctx.stroke();
    ctx.shadowBlur = 0;
    // Body lying flat
    ctx.fillStyle = '#222233';
    ctx.beginPath();
    ctx.roundRect(-torsoH/2, -torsoW/2, torsoH, torsoW, 6);
    ctx.fill();
    ctx.fillStyle = sc.armor;
    ctx.beginPath();
    ctx.roundRect(-torsoH*0.4, -torsoW*0.35, torsoH*0.8, torsoW*0.7, 4);
    ctx.fill();
    // Head
    ctx.shadowColor = '#ff0000'; ctx.shadowBlur = 8;
    ctx.fillStyle = sc.body;
    ctx.beginPath();
    ctx.arc(torsoH * 0.62, 0, headR, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
    // Dark face
    ctx.fillStyle = '#12121e';
    ctx.beginPath();
    ctx.arc(torsoH * 0.62, 0, headR * 0.84, 0, Math.PI * 2);
    ctx.fill();
    // X-X eyes
    ctx.strokeStyle = '#ff2222'; ctx.lineWidth = 2.5 * s;
    const ew = 4 * s;
    [[-0.35, 0], [0.35, 0]].forEach(([ex_off, ey_off]) => {
      const ex = torsoH * 0.62 + ex_off * headR;
      ctx.beginPath();
      ctx.moveTo(ex - ew, -ew); ctx.lineTo(ex + ew, ew);
      ctx.moveTo(ex + ew, -ew); ctx.lineTo(ex - ew, ew);
      ctx.stroke();
    });
    // Ear
    ctx.fillStyle = sc.body;
    ctx.beginPath();
    ctx.arc(torsoH * 0.62, -headR * 1.05, headR * 0.4, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
    // Skull above
    ctx.font = `${Math.round(16 * s)}px serif`;
    ctx.textAlign = 'center';
    ctx.fillText('💀', ox, oy - headR * 1.8 + Math.sin(tickVal * 0.05) * 3);
    ctx.textAlign = 'left';
    return;
  }

  // === SLEEP pose: lying down ===
  if (state === 'activity' && act === 'sleep') {
    ctx.save();
    ctx.translate(ox, oy - legH * 0.3);
    ctx.rotate(-0.28);
    // Body horizontal
    ctx.fillStyle = sc.body;
    ctx.beginPath();
    ctx.roundRect(-torsoH * 0.55, -torsoW * 0.45, torsoH * 1.1, torsoW * 0.9, 6);
    ctx.fill();
    ctx.fillStyle = sc.armor;
    ctx.beginPath();
    ctx.roundRect(-torsoH * 0.42, -torsoW * 0.32, torsoH * 0.84, torsoW * 0.64, 4);
    ctx.fill();
    // Head
    ctx.fillStyle = sc.body;
    ctx.beginPath();
    ctx.arc(torsoH * 0.58, 0, headR, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#12121e';
    ctx.beginPath();
    ctx.arc(torsoH * 0.58, 0, headR * 0.84, 0, Math.PI * 2);
    ctx.fill();
    // Ears (pointing up when lying)
    ctx.fillStyle = sc.body;
    ctx.beginPath();
    ctx.arc(torsoH * 0.58, -headR * 1.05, headR * 0.38, 0, Math.PI * 2);
    ctx.fill();
    // Closed eyes (curved lines = squinting)
    ctx.strokeStyle = sc.eyeColor; ctx.lineWidth = 2 * s;
    ctx.beginPath();
    ctx.arc(torsoH * 0.58 - headR * 0.38, -headR * 0.1, 3 * s, Math.PI, 0);
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(torsoH * 0.58 + headR * 0.38, -headR * 0.1, 3 * s, Math.PI, 0);
    ctx.stroke();
    ctx.restore();
    // ZZZ floating
    ctx.fillStyle = `rgba(200,220,255,${0.5 + Math.sin(tickVal * 0.04) * 0.3})`;
    ctx.font = `${Math.round(8 * s)}px monospace`;
    const zi = ['z', 'zz', 'zzz'][Math.floor(tickVal / 38) % 3];
    const zfloat = oy - torsoH - legH * 0.8 - (tickVal % 38) * 0.25;
    ctx.textAlign = 'center';
    ctx.fillText(zi, ox + 14 * s, zfloat);
    ctx.textAlign = 'left';
    return;
  }

  // === NORMAL BIPEDAL DRAWING ===

  // --- TAIL ---
  const tailX = ox - torsoW * 0.42 + bodySwing;
  const tailY = torsoB - torsoH * 0.35 + bodyBob;
  ctx.save();
  ctx.strokeStyle = sc.tailColor;
  ctx.lineWidth = 3 * s;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(tailX, tailY);
  ctx.bezierCurveTo(
    tailX - 20 * s, tailY + 18 * s,
    tailX - 38 * s, tailY + 10 * s,
    tailX - 30 * s, tailY - 14 * s
  );
  ctx.stroke();
  // Glowing tail tip
  ctx.shadowColor = sc.glowColor; ctx.shadowBlur = 8;
  ctx.strokeStyle = sc.accent; ctx.lineWidth = 2 * s;
  ctx.beginPath();
  ctx.moveTo(tailX - 30 * s, tailY - 14 * s);
  ctx.lineTo(tailX - 34 * s, tailY - 20 * s);
  ctx.stroke();
  ctx.shadowBlur = 0;
  ctx.restore();

  // --- LEGS ---
  let leftLegOff = 0, rightLegOff = 0, leftFootX = 0, rightFootX = 0;
  if (state === 'walking') {
    const ph = (walkFrame % 4) / 4 * Math.PI * 2;
    leftLegOff  = Math.sin(ph) * 7 * s;
    rightLegOff = -Math.sin(ph) * 7 * s;
    leftFootX   = Math.sin(ph) * 4 * s;
    rightFootX  = -Math.sin(ph) * 4 * s;
  } else if (state === 'activity' && act === 'gym') {
    const gymPh = Math.sin(tickVal * 0.1);
    leftLegOff  = gymPh * 5 * s;
    rightLegOff = -gymPh * 5 * s;
  } else if (state === 'activity' && act === 'gaming') {
    const gpPh = Math.sin(tickVal * 0.15);
    leftLegOff  = gpPh * 4 * s;
    rightLegOff = gpPh * 4 * s;
  }

  // Shustrik: speed blur on legs
  if (rat.id === 'shustrik' && state === 'walking') {
    ctx.save();
    ctx.globalAlpha = 0.4;
    for (let blur = 1; blur <= 2; blur++) {
      ctx.fillStyle = sc.accent;
      ctx.beginPath();
      ctx.roundRect(ox - legW * 2.2 - blur * 3 * s + bodySwing, hipsY + bodyBob, legW, legH, 3 * s);
      ctx.fill();
      ctx.beginPath();
      ctx.roundRect(ox + legW * 0.7 + blur * 3 * s + bodySwing, hipsY + bodyBob, legW, legH, 3 * s);
      ctx.fill();
    }
    ctx.restore();
  }

  ctx.fillStyle = sc.armor;
  const legBaseY = hipsY + bodyBob;
  // Left leg
  ctx.beginPath();
  ctx.roundRect(ox - legW * 2.1 + bodySwing, legBaseY, legW, legH + leftLegOff, 3 * s);
  ctx.fill();
  // Left boot
  ctx.beginPath();
  ctx.ellipse(ox - legW * 1.6 + leftFootX + bodySwing, feetY + leftLegOff + bodyBob, legW, legW * 0.48, 0, 0, Math.PI * 2);
  ctx.fill();
  // Right leg
  ctx.beginPath();
  ctx.roundRect(ox + legW * 1.1 + bodySwing, legBaseY, legW, legH + rightLegOff, 3 * s);
  ctx.fill();
  // Right boot
  ctx.beginPath();
  ctx.ellipse(ox + legW * 1.6 + rightFootX + bodySwing, feetY + rightLegOff + bodyBob, legW, legW * 0.48, 0, 0, Math.PI * 2);
  ctx.fill();

  // --- TORSO ---
  ctx.fillStyle = sc.body;
  ctx.beginPath();
  ctx.roundRect(ox - torsoW / 2 + bodySwing, torsoT + bodyBob, torsoW, torsoH, 5 * s);
  ctx.fill();

  // Armor chest plate
  ctx.fillStyle = sc.armor;
  ctx.beginPath();
  ctx.roundRect(ox - torsoW * 0.38 + bodySwing, torsoT + torsoH * 0.08 + bodyBob, torsoW * 0.76, torsoH * 0.58, 3 * s);
  ctx.fill();

  // ID badge on vest
  const badges = { shnyr:'👑', kodogryz:'⚙️', miron:'⚡', zhirobas:'⭐', shustrik:'💨', skolzkiy:'🎭', tykovka:'🔭', xrustik:'🎧' };
  const badge = badges[rat.id] || '•';
  ctx.font = `${Math.round(10 * s)}px serif`;
  ctx.textAlign = 'center';
  ctx.fillText(badge, ox + bodySwing, torsoT + torsoH * 0.56 + bodyBob);
  ctx.textAlign = 'left';

  // Жиробас: fat belly bulge
  if (fat) {
    ctx.fillStyle = sc.armor + 'bb';
    ctx.beginPath();
    ctx.ellipse(ox + bodySwing, torsoT + torsoH * 0.7 + bodyBob, torsoW * 0.48, torsoH * 0.28, 0, 0, Math.PI * 2);
    ctx.fill();
  }

  // --- ARMS ---
  let leftArmAngle = -0.15, rightArmAngle = 0.15;
  if (state === 'walking') {
    const ph = (walkFrame % 4) / 4 * Math.PI * 2;
    leftArmAngle  = -0.15 - Math.sin(ph) * 0.55;
    rightArmAngle =  0.15 + Math.sin(ph) * 0.55;
  } else if (state === 'activity') {
    if (act === 'typing') {
      leftArmAngle  =  0.85 + Math.sin(tickVal * 0.55) * 0.22;
      rightArmAngle = -0.85 - Math.sin(tickVal * 0.55 + Math.PI) * 0.22;
    } else if (act === 'gym') {
      const gp = Math.sin(tickVal * 0.1);
      leftArmAngle  = -1.4 + gp * 0.7;
      rightArmAngle =  1.4 - gp * 0.7;
    } else if (act === 'gaming') {
      leftArmAngle  =  0.55 + Math.sin(tickVal * 0.14) * 0.22;
      rightArmAngle = -0.55 + Math.sin(tickVal * 0.14 + 1) * 0.22;
    } else if (act === 'eat_pizza') {
      leftArmAngle  = -0.75 + Math.sin(tickVal * 0.18) * 0.2;
      rightArmAngle = -0.5;
    } else if (act === 'beer') {
      leftArmAngle  = -0.3 + Math.sin(tickVal * 0.18) * 0.4;
      rightArmAngle = -1.1 + Math.sin(tickVal * 0.08) * 0.2;
    }
  }

  const armBaseY = torsoT + torsoH * 0.18 + bodyBob;
  // Left arm
  ctx.save();
  ctx.translate(ox - torsoW * 0.47 + bodySwing, armBaseY);
  ctx.rotate(leftArmAngle);
  ctx.fillStyle = sc.body;
  ctx.beginPath(); ctx.roundRect(-armW / 2, 0, armW, armL, 2 * s); ctx.fill();
  ctx.shadowColor = sc.accent; ctx.shadowBlur = 5;
  ctx.fillStyle = sc.accent;
  ctx.beginPath(); ctx.arc(0, armL, armW * 0.78, 0, Math.PI * 2); ctx.fill();
  ctx.shadowBlur = 0;
  ctx.restore();

  // Right arm
  ctx.save();
  ctx.translate(ox + torsoW * 0.47 + bodySwing, armBaseY);
  ctx.rotate(rightArmAngle);
  ctx.fillStyle = sc.body;
  ctx.beginPath(); ctx.roundRect(-armW / 2, 0, armW, armL, 2 * s); ctx.fill();
  ctx.shadowColor = sc.accent; ctx.shadowBlur = 5;
  ctx.fillStyle = sc.accent;
  ctx.beginPath(); ctx.arc(0, armL, armW * 0.78, 0, Math.PI * 2); ctx.fill();
  ctx.shadowBlur = 0;
  ctx.restore();

  // Beer mug held by right arm
  if (state === 'activity' && act === 'beer') {
    const bob = Math.sin(tickVal * 0.18) * 3 * s;
    ctx.save();
    ctx.translate(ox + torsoW * 0.52 + bodySwing, armBaseY + armL * 0.6 + bob + bodyBob);
    ctx.rotate(Math.sin(tickVal * 0.08) * 0.3 - 0.5);
    ctx.fillStyle = '#c8a000'; ctx.fillRect(-3 * s, -18 * s, 7 * s, 18 * s);
    ctx.fillStyle = '#e8d060'; ctx.fillRect(-3 * s, -24 * s, 7 * s, 7 * s);
    ctx.restore();
    if (Math.floor(tickVal / 15) % 2 === 0) {
      ctx.fillStyle = 'rgba(255,200,50,0.8)';
      ctx.font = `${Math.round(10 * s)}px serif`;
      ctx.textAlign = 'center';
      ctx.fillText('🎵', ox + torsoW * 0.75 + bodySwing, torsoT + bodyBob);
      ctx.textAlign = 'left';
    }
  }

  // --- HEAD ---
  ctx.save();
  ctx.translate(bodySwing, bodyBob);

  // RGB cyber glow
  ctx.shadowColor = sc.glowColor;
  ctx.shadowBlur = 10 + Math.sin(tickVal * 0.07) * 5;
  ctx.fillStyle = sc.body;
  ctx.beginPath(); ctx.arc(ox, headCY, headR, 0, Math.PI * 2); ctx.fill();
  ctx.shadowBlur = 0;

  // Dark face
  ctx.fillStyle = '#12121e';
  ctx.beginPath(); ctx.arc(ox, headCY, headR * 0.83, 0, Math.PI * 2); ctx.fill();

  // Pointy cyber ears
  ctx.fillStyle = sc.body;
  // Left ear
  ctx.beginPath();
  ctx.moveTo(ox - headR * 0.42, headCY - headR * 0.62);
  ctx.lineTo(ox - headR * 1.08, headCY - headR * 1.75);
  ctx.lineTo(ox - headR * 0.05, headCY - headR * 0.88);
  ctx.closePath(); ctx.fill();
  // Right ear
  ctx.beginPath();
  ctx.moveTo(ox + headR * 0.42, headCY - headR * 0.62);
  ctx.lineTo(ox + headR * 1.08, headCY - headR * 1.75);
  ctx.lineTo(ox + headR * 0.05, headCY - headR * 0.88);
  ctx.closePath(); ctx.fill();
  // Inner ear glow
  ctx.fillStyle = sc.accent + 'aa';
  ctx.beginPath();
  ctx.moveTo(ox - headR * 0.43, headCY - headR * 0.7);
  ctx.lineTo(ox - headR * 0.92, headCY - headR * 1.55);
  ctx.lineTo(ox - headR * 0.12, headCY - headR * 0.93);
  ctx.closePath(); ctx.fill();
  ctx.beginPath();
  ctx.moveTo(ox + headR * 0.43, headCY - headR * 0.7);
  ctx.lineTo(ox + headR * 0.92, headCY - headR * 1.55);
  ctx.lineTo(ox + headR * 0.12, headCY - headR * 0.93);
  ctx.closePath(); ctx.fill();

  // --- EYES ---
  const eyeY = headCY - headR * 0.1;
  const eyeSpX = headR * 0.46;

  // Glowing eyes
  ctx.shadowColor = sc.eyeColor;
  ctx.shadowBlur = 7 + Math.sin(tickVal * 0.11) * 3;
  ctx.fillStyle = sc.eyeColor;
  ctx.beginPath(); ctx.arc(ox - eyeSpX, eyeY, 4 * s, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(ox + eyeSpX, eyeY, 4 * s, 0, Math.PI * 2); ctx.fill();
  // Pupils
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.arc(ox - eyeSpX + s * 0.9, eyeY + s * 0.6, 2 * s, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(ox + eyeSpX + s * 0.9, eyeY + s * 0.6, 2 * s, 0, Math.PI * 2); ctx.fill();

  // Snout
  ctx.fillStyle = sc.body;
  ctx.beginPath();
  ctx.ellipse(ox + headR * 0.05, headCY + headR * 0.44, headR * 0.36, headR * 0.27, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#ff8899';
  ctx.beginPath(); ctx.arc(ox + headR * 0.05, headCY + headR * 0.59, headR * 0.12, 0, Math.PI * 2); ctx.fill();

  // === AGENT-SPECIFIC TRAITS ===

  // Шнырь: golden crown
  if (rat.id === 'shnyr' || rat.crown) {
    ctx.fillStyle = '#ffcc00';
    const cBase = headCY - headR * 0.86;
    ctx.beginPath();
    ctx.moveTo(ox - headR * 0.62, cBase);
    ctx.lineTo(ox - headR * 0.5, cBase - headR * 0.78);
    ctx.lineTo(ox - headR * 0.18, cBase - headR * 0.46);
    ctx.lineTo(ox, cBase - headR * 0.92);
    ctx.lineTo(ox + headR * 0.18, cBase - headR * 0.46);
    ctx.lineTo(ox + headR * 0.5, cBase - headR * 0.78);
    ctx.lineTo(ox + headR * 0.62, cBase);
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle = '#ff9900'; ctx.lineWidth = 0.8; ctx.stroke();
    ctx.fillStyle = '#ff2244';
    ctx.beginPath(); ctx.arc(ox, cBase - headR * 0.62, headR * 0.12, 0, Math.PI * 2); ctx.fill();
  }

  // Скользкий: cyber visor mask
  if (rat.id === 'skolzkiy') {
    ctx.fillStyle = 'rgba(130, 0, 190, 0.72)';
    ctx.beginPath();
    ctx.ellipse(ox, headCY + headR * 0.2, headR * 0.88, headR * 0.46, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = sc.accent; ctx.lineWidth = 1.5 * s;
    ctx.beginPath();
    ctx.moveTo(ox - headR * 0.85, headCY + headR * 0.1);
    ctx.lineTo(ox + headR * 0.85, headCY + headR * 0.1);
    ctx.stroke();
    ctx.fillStyle = `rgba(210, 60, 255, ${0.18 + Math.sin(tickVal * 0.09) * 0.1})`;
    ctx.beginPath();
    ctx.ellipse(ox, headCY + headR * 0.1, headR * 0.72, headR * 0.36, 0, 0, Math.PI * 2);
    ctx.fill();
  }

  // Тыковка: nerd glasses
  if (rat.id === 'tykovka') {
    ctx.strokeStyle = '#44ddff'; ctx.lineWidth = 2 * s;
    ctx.shadowColor = '#44ddff'; ctx.shadowBlur = 6;
    ctx.beginPath(); ctx.arc(ox - eyeSpX, eyeY, 5.5 * s, 0, Math.PI * 2); ctx.stroke();
    ctx.beginPath(); ctx.arc(ox + eyeSpX, eyeY, 5.5 * s, 0, Math.PI * 2); ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(ox - eyeSpX + 5.5 * s, eyeY);
    ctx.lineTo(ox + eyeSpX - 5.5 * s, eyeY);
    ctx.stroke();
    ctx.shadowBlur = 0;
  }

  // Хрустик: headphones
  if (rat.id === 'xrustik' || rat.headphones) {
    ctx.strokeStyle = '#7a3a10'; ctx.lineWidth = 3.5 * s;
    ctx.beginPath();
    ctx.arc(ox, headCY, headR * 1.2, -Math.PI * 0.85, -Math.PI * 0.15);
    ctx.stroke();
    ctx.fillStyle = '#8B4513';
    ctx.beginPath(); ctx.arc(ox - headR * 1.14, headCY, headR * 0.32, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(ox + headR * 1.14, headCY, headR * 0.32, 0, Math.PI * 2); ctx.fill();
    ctx.shadowColor = sc.accent; ctx.shadowBlur = 6;
    ctx.fillStyle = sc.accent;
    ctx.beginPath(); ctx.arc(ox - headR * 1.14, headCY, headR * 0.16, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(ox + headR * 1.14, headCY, headR * 0.16, 0, Math.PI * 2); ctx.fill();
    ctx.shadowBlur = 0;
    // Music notes
    const noteIdx = Math.floor(tickVal * 0.05) % 4;
    const notes = ['♪','♫','♬','♩'];
    const notePhase = (tickVal * 0.03) % 1;
    ctx.fillStyle = `rgba(255,100,200,${0.8 - notePhase * 0.7})`;
    ctx.font = `${Math.round(9 * s)}px serif`;
    ctx.fillText(notes[noteIdx], ox + headR * 1.35, headCY - headR * 0.8 - notePhase * headR * 1.5);
    if (notePhase > 0.5) {
      ctx.fillStyle = `rgba(200,80,255,${0.8 - (notePhase - 0.5) * 1.6})`;
      ctx.fillText(notes[(noteIdx + 1) % 4], ox + headR * 1.0, headCY - headR * 1.4 - (notePhase - 0.5) * headR * 1.5);
    }
  }

  ctx.restore(); // end head group (bodySwing/bodyBob translate)

  // --- NAME TAG ---
  ctx.fillStyle = 'rgba(180,210,255,0.55)';
  ctx.font = `${Math.round(8 * s)}px monospace`;
  ctx.textAlign = 'center';
  ctx.fillText(rat.name, ox + bodySwing, headCY - headR * 2.0 + bodyBob);
  ctx.textAlign = 'left';

  // --- ACTIVITY ICONS ---
  if (state === 'activity' && act !== 'idle') {
    const icons = {
      typing:'⌨️', coffee:'☕', think:'💭', debug:'😤', commit:'🎉', gaming:'🎮',
      tv:'📺', eat_pizza:'🍕', beer:'🍺', shower:'💧', gym:'💪', sex:'💕', sleep:'😴',
      microwave:'🍕', toilet:'🚽', slot:'🎰'
    };
    if (icons[act]) {
      ctx.font = `${Math.round(11 * s)}px serif`;
      ctx.textAlign = 'center';
      ctx.fillText(icons[act], ox + bodySwing, headCY - headR * 3.0 + bodyBob);
      ctx.textAlign = 'left';
    }
    ctx.font = `${Math.round(8 * s)}px monospace`;
    ctx.textAlign = 'center';
    if (act === 'commit' && Math.floor(tickVal / 28) % 2 === 0) {
      ctx.fillStyle = '#ffcc44';
      ctx.fillText('PUSH!', ox + bodySwing, headCY - headR * 4.0 + bodyBob);
    }
    if (act === 'debug' && Math.floor(tickVal / 18) % 2 === 0) {
      ctx.fillStyle = '#ff4444';
      ctx.fillText('WTF?!', ox + bodySwing, headCY - headR * 4.0 + bodyBob);
    }
    if (act === 'think') {
      ctx.fillStyle = 'rgba(180,200,255,0.8)';
      ctx.fillText('???', ox + bodySwing, headCY - headR * 4.0 + bodyBob);
    }
    if (act === 'typing') {
      if (Math.floor(tickVal / 6) % 2 === 0) {
        ctx.fillStyle = '#00aa44';
        ctx.fillText('// code...', ox + bodySwing, headCY - headR * 3.6 + bodyBob);
      }
      if (tickVal % 10 === Math.floor(rat.x) % 10) {
        rat.particles.push({
          x: rat.x + (Math.random() - 0.5) * 30,
          y: rat.y + headCY - headR * 2.5,
          vx: (Math.random() - 0.5) * 0.8,
          vy: -0.8 - Math.random() * 0.5,
          color: 'rgba(0,200,80,0.7)', life: 40, size: 7,
          isText: true, char: String.fromCharCode(65 + Math.floor(Math.random() * 26))
        });
      }
    }
    if (act === 'slot' && typeof slotSpinning !== 'undefined' && slotSpinning) {
      ctx.fillStyle = '#ffcc00';
      ctx.fillText('ВЕЗЁТ!', ox + bodySwing, headCY - headR * 4.0 + bodyBob);
    }
    ctx.textAlign = 'left';
  }
}

function drawRat(rat) {
  const {x, y, sz, facing, blur} = rat;

  // Crashed: handled inside drawCyberMouse
  ctx.save();
  ctx.translate(px(x), y);
  if (facing < 0) ctx.scale(-1, 1);

  // Blur trail (Шустрик)
  if (blur && rat.trail.length > 0 && rat.state === 'walking') {
    rat.trail.forEach((t, i) => {
      ctx.save();
      ctx.globalAlpha = (1 - i / rat.trail.length) * 0.28;
      ctx.translate(px(t.x) - px(x), 0);
      drawCyberMouse(0, 0, rat, tick);
      ctx.restore();
    });
  }

  // Special: phone rat in bed (Пузик)
  if (rat.state === 'activity' && rat.act === 'sleep' && rat.phoneInBed) {
    ctx.save();
    ctx.rotate(-0.38); ctx.translate(0, 4 * sz);
    drawCyberMouse(0, 0, rat, tick);
    // Phone glow overlay
    const bw2 = Math.round(20 * sz), bh2 = Math.round(14 * sz);
    ctx.shadowColor = 'rgba(150,200,255,0.8)'; ctx.shadowBlur = 10;
    ctx.fillStyle = '#001122';
    ctx.fillRect(-bw2 * 0.7, -bh2 * 2.2, bw2 * 0.9, bh2 * 1.2);
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#0044aa';
    ctx.font = Math.round(7 * sz) + 'px monospace';
    ctx.fillText('📱', -bw2 * 0.4, -bh2 * 1.4);
    const scrollY = (tick * 0.5) % 20;
    ctx.fillStyle = 'rgba(100,150,255,0.4)';
    ctx.fillRect(-bw2 * 0.6, -bh2 * 2.0 + scrollY, bw2 * 0.5, 4);
    ctx.fillRect(-bw2 * 0.6, -bh2 * 2.0 + scrollY + 8, bw2 * 0.4, 3);
    ctx.restore();
    ctx.restore();
    rat.particles.forEach(p => {
      ctx.fillStyle = p.color;
      if (p.isHeart) { ctx.font = p.size + 'px serif'; ctx.fillText('💕', px(p.x), p.y); }
      else if (p.isText) { ctx.font = 'bold ' + p.size + 'px monospace'; ctx.fillText(p.char, px(p.x), p.y); }
      else { ctx.shadowColor = p.color; ctx.shadowBlur = 3; ctx.fillRect(px(p.x), p.y, p.size, p.size); ctx.shadowBlur = 0; }
    });
    return;
  }

  drawCyberMouse(0, 0, rat, tick);
  ctx.restore();

  // Particles outside transform
  rat.particles.forEach(p => {
    ctx.fillStyle = p.color;
    if (p.isHeart) { ctx.font = p.size + 'px serif'; ctx.fillText('💕', px(p.x), p.y); }
    else if (p.isText) { ctx.font = 'bold ' + p.size + 'px monospace'; ctx.fillText(p.char, px(p.x), p.y); }
    else { ctx.shadowColor = p.color; ctx.shadowBlur = 3; ctx.fillRect(px(p.x), p.y, p.size, p.size); ctx.shadowBlur = 0; }
  });
}

// CHAT BUBBLES DRAW
// ═══════════════════════════════════════════════
function drawChatBubbles() {
  chatBubbles.forEach(b => {
    const alpha = Math.min(1, b.timer/30) * Math.min(1, (180-b.timer)/20);
    if(alpha <= 0) return;
    ctx.save();
    ctx.globalAlpha = alpha;
    const txt = b.msg;
    ctx.font='9px monospace';
    const tw = ctx.measureText(txt).width;
    const bw2 = tw + 16, bh2 = 18;
    const bx = px(b.x) - bw2/2;
    const by2 = b.y - 46 - (1 - b.timer/180)*20;
    // Bubble background
    ctx.fillStyle='rgba(20,30,60,0.92)';
    ctx.beginPath();
    ctx.roundRect(bx, by2, bw2, bh2, 4);
    ctx.fill();
    ctx.strokeStyle='rgba(80,130,220,0.8)'; ctx.lineWidth=1;
    ctx.stroke();
    // Tail
    ctx.fillStyle='rgba(20,30,60,0.92)';
    ctx.beginPath();
    ctx.moveTo(px(b.x)-4, by2+bh2);
    ctx.lineTo(px(b.x)+4, by2+bh2);
    ctx.lineTo(px(b.x), by2+bh2+7);
    ctx.closePath(); ctx.fill();
    // Text
    ctx.fillStyle='#ccddff'; ctx.font='9px monospace';
    ctx.fillText(txt, bx+8, by2+12);
    ctx.restore();
  });
}

// POPUP
// ═══════════════════════════════════════════════
const popupEl = document.getElementById('popup');

function showPopup(rat, mx, my) {
  const statusData = statusMap[rat.agentId] || {};
  const status = statusData.status || rat.status || 'idle';
  const statusLabel = {working:'Работает 💻', idle:'Отдыхает 🍕', crashed:'Вырубился 💀'}[status] || status;
  const statusClass = {working:'working', idle:'idle', crashed:'crashed'}[status] || 'idle';

  const task = statusData.task || rat.task || '—';
  const model = statusData.model || rat.model || '—';
  const commits = statusData.commits ?? rat.commits ?? 0;
  const workMin = statusData.workMinutes ?? rat.workMinutes ?? 0;
  const totalMin = statusData.totalMinutes ?? rat.totalMinutes ?? 0;

  const formatTime = (mins) => {
    if (mins < 60) return mins + ' мин';
    const h = Math.floor(mins/60), m = mins%60;
    return h + 'ч ' + (m > 0 ? m + 'м' : '');
  };

  popupEl.innerHTML = `
    <div class="pname">${rat.name}</div>
    <div class="prole">${rat.role || rat.id}</div>
    <div class="pdivider"></div>
    <div class="prow">
      <span class="plabel">Статус:</span>
      <span class="pval pstatus-${statusClass}"><span class="pdot s-${statusClass}"></span>${statusLabel}</span>
    </div>
    <div class="prow">
      <span class="plabel">Задача:</span>
      <span class="pval" style="max-width:180px;text-align:right;font-size:11px">${task}</span>
    </div>
    <div class="pdivider"></div>
    <div class="prow">
      <span class="plabel">Модель:</span>
      <span class="pmodel">${model}</span>
    </div>
    <div class="prow">
      <span class="plabel">Коммиты:</span>
      <span class="pval">🔧 ${commits}</span>
    </div>
    <div class="prow">
      <span class="plabel">В работе:</span>
      <span class="pval">⏱ ${formatTime(workMin)}</span>
    </div>
    <div class="prow">
      <span class="plabel">В норе всего:</span>
      <span class="pval">🐀 ${formatTime(totalMin)}</span>
    </div>
  `;

  // Позиционирование popup
  const pw = 320, ph = 220;
  let px2 = mx + 15, py2 = my - 10;
  if (px2 + pw > window.innerWidth) px2 = mx - pw - 15;
  if (py2 + ph > window.innerHeight) py2 = my - ph;
  popupEl.style.left = px2 + 'px';
  popupEl.style.top = py2 + 'px';
  popupEl.style.display = 'block';
}

function handleClick(wx, wy, sx, sy) {
  // Sprint board easter egg (PANIC MODE)
  if(wx >= 90 && wx <= 610 && wy >= oY(0.08) && wy <= FLOOR_Y) {
    const msgs = ['🔥 SPRINT FAILED! ВСЁ ГОРИТ', '💀 DEADLINE СЕГОДНЯ В 9:00', '🚨 BOSS ONLINE!', '⚡ ВСЕМ РАБОТАТЬ!'];
    showToast(msgs[Math.floor(Math.random()*msgs.length)], 100);
    // Make all office rats run to desks

function drawCatScare() {
  if(!catScare) return;
  const {x, y, timer} = catScare;
  const alpha = Math.min(1, timer/40) * Math.min(1, (400-timer)/40);
  ctx.save();
  ctx.globalAlpha = alpha * 0.85;
  ctx.translate(px(x), y);
  ctx.scale(-1,1); // facing left
  // Cat shadow silhouette
  ctx.fillStyle='rgba(0,0,0,0.8)';
  // Body
  ctx.beginPath(); ctx.ellipse(0, 0, 35, 22, 0, 0, Math.PI*2); ctx.fill();
  // Head
  ctx.beginPath(); ctx.arc(38, -12, 20, 0, Math.PI*2); ctx.fill();
  // Ears
  ctx.beginPath(); ctx.moveTo(28,-28); ctx.lineTo(34,-46); ctx.lineTo(46,-30); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(44,-30); ctx.lineTo(52,-46); ctx.lineTo(60,-28); ctx.closePath(); ctx.fill();
  // Tail
  ctx.strokeStyle='rgba(0,0,0,0.8)'; ctx.lineWidth=8;
  ctx.beginPath(); ctx.moveTo(-35,-8);
  ctx.bezierCurveTo(-70,-8,-80,20,-65,35); ctx.stroke();
  // Glowing eyes
  ctx.globalAlpha=alpha;
  ctx.fillStyle=`rgba(200,255,50,${0.8+Math.sin(timer*0.2)*0.2})`;
  ctx.shadowColor='#aaff00'; ctx.shadowBlur=10;
  ctx.beginPath(); ctx.ellipse(32,-12,5,7,0.2,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(46,-12,5,7,-0.2,0,Math.PI*2); ctx.fill();
  ctx.shadowBlur=0;
  ctx.restore();
  // Warning text
  if(timer > 300 && Math.floor(timer/10)%2===0) {
    ctx.fillStyle='rgba(255,50,50,0.9)'; ctx.font='bold 14px monospace'; ctx.textAlign='center';
    ctx.fillText('⚠️ КОТ!!! БЕЖИМ!!! ⚠️', cw/2, dMid()-30);
    ctx.textAlign='left';
  }
}

function drawPawTrails() {
  pawTrails.forEach(p => {
    if (p.alpha <= 0.01) return;
    const s = 5.5;
    ctx.save();
    ctx.globalAlpha = p.alpha;
    ctx.translate(p.x, p.y);
    ctx.rotate(p.rotation);
    const r = themeDark ? 180 : 120, g = themeDark ? 90 : 55, b = themeDark ? 55 : 20;
    ctx.fillStyle = `rgb(${r},${g},${b})`;
    // Main palm pad
    ctx.beginPath(); ctx.ellipse(0, s*0.35, s*0.88, s*0.65, 0, 0, Math.PI*2); ctx.fill();
    // 3 toe pads
    [[-s*0.6, -s*0.25], [0, -s*0.68], [s*0.6, -s*0.25]].forEach(([tx, ty]) => {
      ctx.beginPath(); ctx.ellipse(tx, ty, s*0.34, s*0.28, 0, 0, Math.PI*2); ctx.fill();
    });
    ctx.restore();
    p.alpha -= 0.010; // ~1.7s to fade
  });
  pawTrails = pawTrails.filter(p => p.alpha > 0.01);
}

// MAIN LOOP
// ═══════════════════════════════════════════════
function loop(ts) {
  const dt = Math.min((ts - lastTime)/1000, 0.05);
  lastTime = ts; tick++;

  // Camera - disabled, world fits in single screen
  camX = 0;

  // Keyboard scroll
  applyKeyboardScroll();

  // Microwave countdown
  if(microwaveTimer > 0) microwaveTimer -= dt*60;

  // Slot machine
  if(slotSpinning) slotTick += dt*60;

  // Server blips
  serverBlip = serverBlip.filter(b => b.life-- > 0);

  // Update dust
  updateDust();

  // Update rats
  rats.forEach(r => {
    r.update(dt);
    if(r.state==='activity'){
      if(r.act==='commit' && tick%62===0) r.addConfetti();
      if(r.act==='shower' && tick%8===0) r.addWater();
      if(r.act==='sex' && tick%26===0) r.addHeart();
    }
  });

  Ambulance.update();
  // Проверяем нужна ли скорая
  rats.forEach(r => {
    if (r.crashed && !Ambulance.active) {
      Ambulance.call(r);
    }
  });

  // Chat bubbles
  nextChatIn--;
  if(nextChatIn <= 0) { spawnChat(); nextChatIn = 150 + Math.random()*250; }
  chatBubbles = chatBubbles.filter(b => b.timer-- > 0);
  chatBubbles.forEach(b => { b.x = b.rat.x; b.y = b.rat.y; });

  // Mini events
  nextEventIn--;
  if(nextEventIn <= 0) { triggerMiniEvent(); nextEventIn = 4000+Math.random()*6000; }
  miniEvents = miniEvents.filter(e => e.timer-- > 0);

  // Cat scare
  nextCatIn--;
  if(nextCatIn <= 0) {
    catScare = {x: WORLD_W+100, y: dY(0.6), timer: 400};
    nextCatIn = 10000 + Math.random()*15000;
  }
  if(catScare) {
    catScare.x -= 2.5;
    catScare.timer--;
    if(catScare.timer <= 0) catScare = null;
    // Scare nearby rats
    if(catScare) {
      rats.filter(r=>r.zone==='den' && Math.abs(r.x-catScare.x)<300).forEach(r => {
        if(Math.random()<0.05) {
          r.tx = Math.random()<0.5 ? r.x-200 : TUNNELS[0]+Math.random()*100;
          r.ty = r.y; r.state='walking';
        }
      });
    }
  }
  miniEvents.forEach(e => { if(e.type==='deliveroo'||e.type==='pizza_delivery') e.wx+=0.6; });

  // Toast timer
  if(toastTimer > 0) {
    toastTimer -= dt*60;
    if(toastTimer <= 0) toastEl.style.display='none';
  }

  // === DRAW ===
  drawBG();
  drawDen();
  drawOffice();

  // Server blip effects
  serverBlip.forEach(b => {
    ctx.fillStyle=`rgba(0,255,100,${b.life/40})`;
    ctx.beginPath(); ctx.arc(px(b.x), b.y, (40-b.life)*0.5, 0, Math.PI*2); ctx.fill();
  });

  // Dust particles
  drawDust();

  // Rats sorted by Y
  [...rats].sort((a,b2)=>a.y-b2.y).forEach(r=>drawRat(r));
  Ambulance.draw();

  drawChatBubbles();
  drawMiniEvents();
  drawCatScare();
  drawPawTrails();
  drawMinimap();
  drawNewsTicker();

  requestAnimationFrame(loop);
}

// ═══════════════════════════════════════════════
// WEB AUDIO — SOUND EFFECTS
// ═══════════════════════════════════════════════
let _audioCtx = null;
let soundEnabled = false; // off by default, user turns on

function _getACtx() {
  if(!_audioCtx) _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if(_audioCtx.state === 'suspended') _audioCtx.resume();
  return _audioCtx;
}

function playSqueak() {
  if(!soundEnabled) return;
  try {
    const ac = _getACtx();
    const osc = ac.createOscillator(), g = ac.createGain();
    osc.connect(g); g.connect(ac.destination);
    osc.type = 'sine';
    osc.frequency.setValueAtTime(1400, ac.currentTime);
    osc.frequency.exponentialRampToValueAtTime(700, ac.currentTime + 0.06);
    osc.frequency.exponentialRampToValueAtTime(1100, ac.currentTime + 0.13);
    g.gain.setValueAtTime(0.06, ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.18);
    osc.start(ac.currentTime); osc.stop(ac.currentTime + 0.18);
  } catch(e) {}
}

function playKonamiMelody() {
  if(!soundEnabled) return;
  try {
    const ac = _getACtx();
    const notes = [523,659,784,1047,784,1047,784,659,523,659,784,1047];
    notes.forEach((freq, i) => {
      const osc = ac.createOscillator(), g = ac.createGain();
      osc.connect(g); g.connect(ac.destination);
      osc.type = i % 2 === 0 ? 'square' : 'triangle';
      osc.frequency.value = freq;
      const t = ac.currentTime + i * 0.1;
      g.gain.setValueAtTime(0, t);
      g.gain.linearRampToValueAtTime(0.08, t + 0.02);
      g.gain.linearRampToValueAtTime(0, t + 0.09);
      osc.start(t); osc.stop(t + 0.1);
    });
  } catch(e) {}
}

function playRaveBeat() {
  if(!soundEnabled) return;
  try {
    const ac = _getACtx();
    const kick = ac.createOscillator(), kg = ac.createGain();
    kick.connect(kg); kg.connect(ac.destination);
    kick.type = 'sine';
    kick.frequency.setValueAtTime(180, ac.currentTime);
    kick.frequency.exponentialRampToValueAtTime(35, ac.currentTime + 0.18);
    kg.gain.setValueAtTime(0.35, ac.currentTime);
    kg.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.22);
    kick.start(ac.currentTime); kick.stop(ac.currentTime + 0.22);
    const hat = ac.createOscillator(), hg = ac.createGain();
    hat.connect(hg); hg.connect(ac.destination);
    hat.type = 'square'; hat.frequency.value = 2000;
    hg.gain.setValueAtTime(0.03, ac.currentTime + 0.15);
    hg.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.22);
    hat.start(ac.currentTime + 0.15); hat.stop(ac.currentTime + 0.22);
  } catch(e) {}
}

  document.body.appendChild(overlay);

  let raveInterval = null;

  function startRave() {
    overlay.style.display = 'block';
    playKonamiMelody();
    soundEnabled = true; // auto-enable sound for rave
    const soundBtn = document.getElementById('sound-btn');
    if(soundBtn) { soundBtn.textContent = '\uD83D\uDD0A звук'; soundBtn.style.color = '#3355bb'; }
    raveInterval = setInterval(playRaveBeat, 350);
    document.addEventListener('keydown', raveEscHandler);
    overlay.addEventListener('click', stopRave);
  }

  function stopRave() {
    overlay.style.display = 'none';
    clearInterval(raveInterval);
    document.removeEventListener('keydown', raveEscHandler);
    overlay.removeEventListener('click', stopRave);
  }

  function raveEscHandler(e) { if(e.key === 'Escape') stopRave(); }

  window.addEventListener('keydown', e => {
    if(e.key === SEQ[idx]) {
      idx++;
      if(idx === SEQ.length) { idx = 0; startRave(); }
    } else {
      idx = (e.key === SEQ[0]) ? 1 : 0;
    }
  });
})();

(function() {
  const btn = document.createElement('div');
  btn.id = 'dark-toggle';
  btn.title = 'Тёмная / светлая тема';
  btn.textContent = themeDark ? '🌙' : '☀️';
  document.body.appendChild(btn);

  function applyTheme() {
    if (themeDark) {
      document.body.classList.remove('light-mode');
      btn.textContent = '🌙';
    } else {
      document.body.classList.add('light-mode');
      btn.textContent = '☀️';
    }
    localStorage.setItem('ratTheme', themeDark ? 'dark' : 'light');
  }
  applyTheme();

  btn.addEventListener('click', () => {
    themeDark = !themeDark;
    applyTheme();
  });
})();

// WAVE 4 — TYPEWRITER TITLE
// ═══════════════════════════════════════════════
(function() {
  const TITLE = '🐀 КРЫСИНАЯ НОРА';
  const textEl = document.getElementById('typewriter-text');
  const wrap = document.getElementById('typewriter-wrap');
  if (!textEl || !wrap) return;

  window.addEventListener('load', () => {
    // Wait for loading screen to finish fading (~1300ms)
    setTimeout(() => {
      wrap.style.opacity = '1';
      let i = 0;
      const iv = setInterval(() => {
        textEl.textContent = TITLE.slice(0, i + 1);
        i++;
        if (i >= TITLE.length) {
          clearInterval(iv);
          // Blink cursor for 2.5s then fade out
          setTimeout(() => { wrap.style.opacity = '0'; }, 2500);
        }
      }, 80);
    }, 1300);
  });
})();

requestAnimationFrame(ts => { lastTime=ts; requestAnimationFrame(loop); });

if (isTouchDevice) {
  hintEl.textContent = '← свайп для скролла →';
} else {
  hintEl.textContent = '← двигай мышь · A/D клавиши для скролла →';
}
// Fade out hint
setTimeout(() => { hintEl.style.opacity='0'; }, 6000);
