// ═══════════════════════════════════════════════
// RAT CLASS
// ═══════════════════════════════════════════════
class Rat {
  constructor(d) {
    Object.assign(this, d);
    const sp = randSpot(this.zone);
    this.x = sp.x + Math.random()*40-20;
    this.y = sp.y;
    this.tx = this.x; this.ty = this.y;
    this.currentSpot = sp;
    this.state = 'activity';
    this.act = sp.act;
    this.actTimer = Math.random() * 400 + 150;
    this.walkFrame = 0; this.walkTick = 0;
    this.facing = 1;
    this.trail = [];
    this.particles = [];
    this.blink = 0;
  }

  pickTarget() {
    const sp = randSpot(this.zone);
    this.tx = sp.x + Math.random()*20-10;
    this.ty = sp.y;
    this.currentSpot = sp;
    this.state = 'walking';
    this.actTimer = 220 + Math.random() * 450;
  }

  update(dt) {
    this.blink = Math.max(0, this.blink - dt*60);
    if (this.state === 'walking') {
      const dx = this.tx - this.x, dy = this.ty - this.y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist < 3) {
        this.x = this.tx; this.y = this.ty;
        this.state = 'activity';
        this.act = this.currentSpot ? this.currentSpot.act : 'idle';
      } else {
        const s = this.spd * dt * 60;
        this.facing = dx >= 0 ? 1 : -1;
        this.x += (dx/dist)*s; this.y += (dy/dist)*s;
        this.walkTick += s * 0.22;
        this.walkFrame = Math.floor(this.walkTick % 4);
        if (this.blur) {
          this.trail.unshift({x:this.x, y:this.y});
          if (this.trail.length > 8) this.trail.pop();
        }
      }
    } else {
      this.trail = [];
      this.actTimer -= dt * 60;
      if (this.actTimer <= 0) this.pickTarget();
    }
    this.particles = this.particles.filter(p => p.life > 0);
    this.particles.forEach(p => {
      p.x += p.vx * dt*60; p.y += p.vy * dt*60;
      p.vy += 0.06 * dt*60; p.life -= dt*60;
    });
  }

  addConfetti() {
    for (let i = 0; i < 16; i++) {
      this.particles.push({
        x:this.x, y:this.y-24,
        vx:(Math.random()-0.5)*3.5, vy:-Math.random()*3-1.5,
        color:['#ff4','#f4f','#4ff','#f84','#8f4','#ff8'][Math.floor(Math.random()*6)],
        life:80, size:3+Math.random()*3, isRect:true
      });
    }
  }

  addHeart() {
    this.particles.push({
      x:this.x + Math.random()*36-18, y:this.y-32-Math.random()*10,
      vx:(Math.random()-0.5)*0.8, vy:-0.7-Math.random()*0.5,
      color:'#ff6699', life:90, size:12, isHeart:true
    });
  }

  addWater() {
    for (let i = 0; i < 3; i++) {
      this.particles.push({
        x:this.x+Math.random()*18-9, y:this.y-12+Math.random()*8,
        vx:(Math.random()-0.5)*1.8, vy:-Math.random()*2-0.5,
        color:'#88ccff', life:22, size:2, isRect:true
      });
    }
  }
}

const DUST = Array.from({length:60}, () => ({
  x: Math.random()*WORLD_W, y: 0,
  vy: 0.1+Math.random()*0.3, vx: (Math.random()-0.5)*0.4,

}));

function updateDust() {
  DUST.forEach(d => {
    d.x += d.vx; d.y += d.vy;
    if(d.y > ch) { d.y = DEN_Y; d.x = Math.random()*WORLD_W; }
    d.x = (d.x + WORLD_W) % WORLD_W;
  });
}

function drawDust() {
  DUST.forEach(d => {
    if(d.y < DEN_Y || d.y > ch-10) return;
    const a = (0.08+Math.sin(tick*0.02+d.phase)*0.04);
    ctx.fillStyle=`rgba(200,160,80,${a})`;
    ctx.beginPath(); ctx.arc(px(d.x), d.y, d.r, 0, Math.PI*2); ctx.fill();
  });
}

// ═══════════════════════════════════════════════
// DRAW HELPERS
// ═══════════════════════════════════════════════
function px(x) { return x - camX; }

function fr(x,y,w,h,c) { ctx.fillStyle=c; ctx.fillRect(px(x),y,w,h); }
function sr(x,y,w,h,c,lw=1) { ctx.strokeStyle=c; ctx.lineWidth=lw; ctx.strokeRect(px(x)+0.5,y+0.5,w-1,h-1); }
function tx(t,x,y,c,sz=10,al='left') { ctx.fillStyle=c; ctx.font=sz+'px monospace'; ctx.textAlign=al; ctx.fillText(t,px(x),y); ctx.textAlign='left'; }
function em(e,x,y,sz=14) { ctx.font=sz+'px serif'; ctx.fillText(e,px(x),y); }

function roundRect(x, y, w, h, r, fill, stroke) {
  const rx = px(x);
  ctx.beginPath();
  ctx.moveTo(rx+r, y);
  ctx.lineTo(rx+w-r, y);
  ctx.quadraticCurveTo(rx+w, y, rx+w, y+r);
  ctx.lineTo(rx+w, y+h-r);
  ctx.quadraticCurveTo(rx+w, y+h, rx+w-r, y+h);
  ctx.lineTo(rx+r, y+h);
  ctx.quadraticCurveTo(rx, y+h, rx, y+h-r);
  ctx.lineTo(rx, y+r);
  ctx.quadraticCurveTo(rx, y, rx+r, y);
  ctx.closePath();
  if(fill) { ctx.fillStyle=fill; ctx.fill(); }
  if(stroke) { ctx.strokeStyle=stroke; ctx.lineWidth=1.5; ctx.stroke(); }
}

function cobweb(x,y) {
  ctx.strokeStyle='rgba(180,180,180,0.15)'; ctx.lineWidth=0.5;
  for(let i=0;i<5;i++){
    ctx.beginPath(); ctx.moveTo(px(x),y);
    ctx.lineTo(px(x+42*Math.cos(i*0.55)),y+42*Math.sin(i*0.55)); ctx.stroke();
  }
  for(let r=8;r<=42;r+=10){
    ctx.beginPath();
    for(let a=0;a<=Math.PI*2;a+=0.35){
      const cx2=x+r*Math.cos(a),cy2=y+r*Math.sin(a);
      a===0?ctx.moveTo(px(cx2),cy2):ctx.lineTo(px(cx2),cy2);
    } ctx.stroke();
  }
}

  const BOOK_TITLES=['CODE','BUGS','GIT','JS','PY','DB','API','OPS'];

    const sy=y+6+shelf*(h/3);

    for(let b=0;b<8;b++) {

function drawRug(x, y) {
  const w=180, h=80;
  ctx.save();
  // Rug base
  ctx.fillStyle='rgba(120,40,10,0.7)';
  ctx.beginPath(); ctx.ellipse(px(x+w/2), y+h/2, w/2, h/2, 0, 0, Math.PI*2); ctx.fill();
  // Pattern
  ctx.strokeStyle='rgba(200,100,30,0.5)'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.ellipse(px(x+w/2), y+h/2, w*0.4, h*0.4, 0, 0, Math.PI*2); ctx.stroke();
  ctx.strokeStyle='rgba(220,160,50,0.4)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.ellipse(px(x+w/2), y+h/2, w*0.25, h*0.25, 0, 0, Math.PI*2); ctx.stroke();
  // Fringe
  for(let f=-8;f<=8;f+=2) {
    ctx.strokeStyle='rgba(180,80,10,0.5)'; ctx.lineWidth=0.5;
    ctx.beginPath(); ctx.moveTo(px(x+w/2+f*10), y); ctx.lineTo(px(x+w/2+f*10), y-6); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(px(x+w/2+f*10), y+h); ctx.lineTo(px(x+w/2+f*10), y+h+6); ctx.stroke();
  }
  // Bean bags on rug
  for(let b=0;b<3;b++) {
    const bx=x+30+b*60, by2=y+20;
    ctx.fillStyle=['#882200','#004488','#224400'][b];

    ctx.beginPath(); ctx.ellipse(px(bx), by2+15, 16, 12, 0, 0, Math.PI*2); ctx.fill();
  }
  ctx.restore();
}

function drawDiscoLights(x, y) {
  // Rotating disco lights from ceiling
  const DISCO_COLORS = ['#ff2244','#22ffaa','#4488ff','#ffcc00','#ff44ff','#44ffff'];
  for(let d=0;d<4;d++) {
    const angle = tick * 0.04 + d * (Math.PI/2);
    const beatPulse = 0.5+Math.sin(tick*0.12)*0.3;
    const col = DISCO_COLORS[(Math.floor(tick/20)+d)%DISCO_COLORS.length];
    const lightX = x + 20 + d*38;
    const lightY = y + 8;
    // Spotlight beam
    ctx.save();
    ctx.globalAlpha=0.12*beatPulse;
    const beamLen = (ch-y)*0.7;
    const beamAngle = angle;
    const endX = lightX + Math.sin(beamAngle)*beamLen;
    const endY = lightY + Math.abs(Math.cos(beamAngle))*beamLen*0.8;
    const grad = ctx.createConicalGradient ? null : null;
    ctx.fillStyle=col;
    ctx.beginPath();
    ctx.moveTo(px(lightX), lightY);
    ctx.lineTo(px(endX-12), endY);
    ctx.lineTo(px(endX+12), endY);
    ctx.closePath(); ctx.fill();
    ctx.restore();
    // Disco ball dot on ceiling
    ctx.fillStyle=col; ctx.shadowColor=col; ctx.shadowBlur=8*beatPulse;
    ctx.beginPath(); ctx.arc(px(lightX), lightY, 4, 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur=0;
  }
  // Disco ball
  const dbx = x+80, dby = y+12;
  fr(dbx-1, y, 2, 16, '#555');
  for(let r=0;r<5;r++) for(let c=0;c<5;c++) {
    const angle = tick*0.06+r*0.8+c*0.6;
    const col2 = DISCO_COLORS[(r*2+c+Math.floor(tick/10))%DISCO_COLORS.length];
    ctx.fillStyle=col2;
    ctx.fillRect(px(dbx-10+c*5), dby-10+r*5, 4, 4);
  }
  ctx.strokeStyle='rgba(200,200,200,0.3)'; ctx.lineWidth=0.5;
  ctx.beginPath(); ctx.arc(px(dbx), dby, 12, 0, Math.PI*2); ctx.stroke();
}

function drawOfficeWindows() {
  const night = isNight();
  const dusk = isDusk();
  const WINDOW_XS = [340, 740, 1120, 1500, 1900, 2280, 2660, 3020];
  WINDOW_XS.forEach((wx2, i) => {
    const wy = 10, ww = 88, wh = Math.round(FLOOR_Y * 0.38);
    // Window frame
    fr(wx2, wy, ww, wh, '#0d0d1e'); sr(wx2, wy, ww, wh, '#1e2e4a', 2);
    // Sky
    let skyTop, skyBot;
    if(night) {
      skyTop='#020410'; skyBot='#050818';
    } else if(dusk) {
      skyTop='#1a0a28'; skyBot='#2a1840';
    } else {
      skyTop='#0a1828'; skyBot='#102040';
    }
    const skyG = ctx.createLinearGradient(0, wy+2, 0, wy+wh-2);
    skyG.addColorStop(0, skyTop); skyG.addColorStop(1, skyBot);
    ctx.fillStyle=skyG; ctx.fillRect(px(wx2+2),wy+2,ww-4,wh-4);
    // Buildings silhouette
    ctx.fillStyle = night ? '#030308' : '#060614';
    const bldH = [wh*0.35, wh*0.5, wh*0.28, wh*0.44, wh*0.32];
    let bx=4;
    for(let b=0;b<5;b++){
      const bh2=bldH[(i+b)%5];
      ctx.fillRect(px(wx2+bx), wy+wh-bh2, 14, bh2);
      // Building windows
      if(night) {
        for(let wr=0;wr<Math.floor(bh2/8)-1;wr++) {
          for(let wc=0;wc<2;wc++) {
            const on = (tick + i*7 + b*13 + wr*3 + wc*5) % 120 > 20;
            ctx.fillStyle=on?'rgba(255,220,80,0.8)':'rgba(0,0,0,0)';
            ctx.fillRect(px(wx2+bx+2+wc*6), wy+wh-bh2+wr*8+3, 4, 4);
          }
        }
      }
      bx += 16 + (b%2)*2;
    }
    // Moon / sun
    if(night) {
      ctx.fillStyle='rgba(220,230,255,0.5)';
      ctx.beginPath(); ctx.arc(px(wx2+ww*0.75), wy+wh*0.2, 7, 0, Math.PI*2); ctx.fill();
    } else {
      ctx.fillStyle='rgba(255,200,50,0.3)';
      ctx.beginPath(); ctx.arc(px(wx2+ww*0.75), wy+wh*0.2, 9, 0, Math.PI*2); ctx.fill();
    }
    // Stars in night windows
    if(night) {
      for(let s=0;s<5;s++) {
        const sa=0.4+Math.sin(tick*0.05+i*3+s)*0.3;
        ctx.fillStyle=`rgba(255,255,255,${sa*0.6})`;
        const stx=wx2+8+s*14+(Math.sin(i+s)*6), sty=wy+6+s*5;
        ctx.beginPath(); ctx.arc(px(stx), sty, 0.8, 0, Math.PI*2); ctx.fill();
      }
    }
    // Rain if raining (periodic)
    if(Math.floor(tick/1200)%3===0) {
      ctx.strokeStyle='rgba(100,180,255,0.4)'; ctx.lineWidth=0.5;
      for(let r=0;r<4;r++){
        const ry=(tick*2+r*18)%(wh-4)+wy+2;
        const rxp=wx2+10+r*20;
        ctx.beginPath(); ctx.moveTo(px(rxp),ry); ctx.lineTo(px(rxp-2),ry+7); ctx.stroke();
      }
    }
    // Frame separator
    ctx.strokeStyle='#1a2a40'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(px(wx2+ww/2),wy+2); ctx.lineTo(px(wx2+ww/2),wy+wh-2); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(px(wx2+2),wy+wh*0.5); ctx.lineTo(px(wx2+ww-2),wy+wh*0.5); ctx.stroke();
  });
}

function drawCeilingFans() {
  const FAN_XS = [240, 640, 1040, 1440, 1840, 2240, 2640, 3040];
  FAN_XS.forEach((fx, i) => {
    const fy = 22;

}

  ctx.rotate(angle);
  // Housing
  ctx.fillStyle='#2a2a3a'; ctx.fillRect(-8,-4,16,8);
  ctx.strokeStyle='#444'; ctx.lineWidth=1; ctx.strokeRect(-8,-4,16,8);
  // Lens
  ctx.fillStyle='#111'; ctx.beginPath(); ctx.arc(7,0,5,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='#333'; ctx.lineWidth=0.5; ctx.stroke();
  // Red LED (recording indicator)
  const recOn = Math.floor(tick/20)%2===0;
  ctx.fillStyle=recOn?'#ff2222':'#440000';
  if(recOn) { ctx.shadowColor='#ff0000'; ctx.shadowBlur=4; }
  ctx.beginPath(); ctx.arc(-5,0,2,0,Math.PI*2); ctx.fill();
  ctx.shadowBlur=0;
  // Lens glint
  ctx.fillStyle='rgba(150,200,255,0.4)';
  ctx.beginPath(); ctx.arc(8,-1,2,0,Math.PI*2); ctx.fill();
  ctx.restore();
  // Mount bracket
  ctx.strokeStyle='#333'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(px(x),0); ctx.lineTo(px(x),y); ctx.stroke();
}

function drawDeadlineCounter(x, y) {
  const now = new Date();
  const nextFriday = new Date(now);
  nextFriday.setDate(now.getDate() + (5 - now.getDay() + 7) % 7 || 7);
  nextFriday.setHours(23,59,59,0);
  const msLeft = nextFriday - now;
  const h = Math.floor(msLeft/3600000);
  const m = Math.floor((msLeft%3600000)/60000);
  const s = Math.floor((msLeft%60000)/1000);
  const urgent = h < 24;
  const w=160, ht=36;
  fr(x, y, w, ht, urgent?'#200000':'#0a0a1a');
  sr(x, y, w, ht, urgent?'#cc0000':'#1a2a4a', 1);
  tx('ДЕДЛАЙН ДО ПЯТНИЦЫ', x+6, y+11, urgent?'#ff4444':'#3366aa', 7);
  const timeStr = h.toString().padStart(2,'0')+':'+m.toString().padStart(2,'0')+':'+s.toString().padStart(2,'0');
  ctx.fillStyle=urgent?`rgba(255,50,50,${0.8+Math.sin(tick*0.15)*0.2})`:'#44aaff';
  ctx.font='bold 13px monospace';
  ctx.fillText(timeStr, px(x+18), y+ht-6);
  if(urgent && Math.floor(tick/15)%2===0) {
    ctx.fillStyle='#ff2222'; ctx.font='8px monospace';
    ctx.fillText('⚠️ СКОРО!!!', px(x+w-70), y+ht-8);
  }
}

function drawFishTank(x, y) {
  const w=62, h=46;
  // Tank glass
  fr(x, y, w, h, 'rgba(0,30,60,0.8)'); sr(x, y, w, h, '#336688', 2);
  // Water gradient
  const wg = ctx.createLinearGradient(0, y, 0, y+h);
  wg.addColorStop(0, 'rgba(0,80,140,0.4)'); wg.addColorStop(1, 'rgba(0,40,80,0.6)');
  ctx.fillStyle=wg; ctx.fillRect(px(x+2),y+2,w-4,h-4);
  // Bubbles
  for(let b=0;b<5;b++) {
    const by2 = y+h-4 - ((tick*0.6+b*9)%(h-8));
    const ba = 0.3+Math.sin(tick*0.08+b)*0.2;
    ctx.fillStyle=`rgba(150,220,255,${ba})`;
    ctx.beginPath(); ctx.arc(px(x+8+b*10), by2, 1.5, 0, Math.PI*2); ctx.fill();
  }
  // Fish 1
  const f1x = x+8 + Math.sin(tick*0.04)*22;
  const f1y = y+h*0.4 + Math.sin(tick*0.07)*8;
  const f1dir = Math.cos(tick*0.04) > 0 ? 1 : -1;
  ctx.save(); ctx.translate(px(f1x), f1y); if(f1dir<0) ctx.scale(-1,1);
  ctx.fillStyle='#ff8822';
  ctx.beginPath(); ctx.ellipse(0,0,7,4,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#ffaa44';
  ctx.beginPath(); ctx.moveTo(-7,0); ctx.lineTo(-12,-4); ctx.lineTo(-12,4); ctx.closePath(); ctx.fill();
  ctx.restore();
  // Fish 2 (smaller, blue)
  const f2x = x+12 + Math.sin(tick*0.06+1.5)*20;
  const f2y = y+h*0.65 + Math.sin(tick*0.1)*6;
  const f2dir = Math.cos(tick*0.06+1.5) > 0 ? 1 : -1;
  ctx.save(); ctx.translate(px(f2x), f2y); if(f2dir<0) ctx.scale(-1,1);
  ctx.fillStyle='#4488ff';
  ctx.beginPath(); ctx.ellipse(0,0,5,3,0,0,Math.PI*2); ctx.fill();
  ctx.restore();
  // Seaweed
  ctx.strokeStyle='rgba(0,180,60,0.6)'; ctx.lineWidth=2;
  for(let s=0;s<3;s++) {
    const sa = Math.sin(tick*0.03+s*0.8);
    ctx.beginPath(); ctx.moveTo(px(x+10+s*18),y+h-4);
    ctx.bezierCurveTo(px(x+10+s*18+sa*5),y+h-14, px(x+10+s*18-sa*5),y+h-24, px(x+10+s*18+sa*3),y+h-32);
    ctx.stroke();
  }
  // Sand
  ctx.fillStyle='#8a6a3a'; ctx.fillRect(px(x+2),y+h-5,w-4,4);
  // Label
  tx('🐟 ПЕТЯ', x+2, y+h+10, '#225588', 8);
}

function drawCalendar(x, y) {
  const w=56, h=64;
  fr(x, y, w, h, '#f5f5f0'); sr(x, y, w, h, '#cccccc', 2);
  // Header
  fr(x, y, w, 18, '#cc2222'); tx('МАРТ', x+14, y+13, '#fff', 9);
  // Rings
  fr(x+16, y-4, 5, 8, '#888'); fr(x+32, y-4, 5, 8, '#888');
  // Days grid
  ctx.font='6px monospace';
  const days=['Пн','Вт','Ср','Чт','Пт','Сб','Вс'];
  days.forEach((d,i) => {
    ctx.fillStyle='#666';
    ctx.fillText(d, px(x+3+i*8), y+28);
  });
  const today = new Date().getDate();
  for(let d=1;d<=31;d++) {
    const row=Math.floor((d-1)/7), col=(d-1)%7;
    const dx=x+3+col*8, dy2=y+36+row*9;
    const isToday=d===today;
    if(isToday) { fr(dx-1,dy2-7,8,8,'#cc2222'); ctx.fillStyle='#fff'; }
    else ctx.fillStyle = col>=5 ? '#cc4444' : '#333';
    ctx.fillText(d.toString(), px(dx), dy2);
  }
  // Mark deadline
  em('💀', x+38, y+54, 8);
}

function drawRatBody(ox, oy, bw, bh, fur, belly, fat, crown, heart) {
  const xw=fat?bw*0.3:0, xh=fat?bh*0.25:0;
  const w=bw+xw, h=bh+xh;

  // Tail
  ctx.strokeStyle=fur; ctx.lineWidth=Math.max(1.5,h*0.11);
  ctx.beginPath();
  ctx.moveTo(ox-w/2+2, oy+h*0.3);
  ctx.bezierCurveTo(ox-w, oy+h*0.6, ox-w*1.4, oy+h*0.9, ox-w*1.1, oy+h*1.15);
  ctx.stroke();

  // Body
  ctx.fillStyle=fur;
  ctx.beginPath();
  ctx.ellipse(ox, oy, w/2, h/2, 0, 0, Math.PI*2);
  ctx.fill();

  // Belly
  ctx.fillStyle=belly;
  ctx.beginPath();
  ctx.ellipse(ox+w*0.05, oy+h*0.05, w*0.28, h*0.28, 0, 0, Math.PI*2);
  ctx.fill();

  // Head
  const hx=ox+w*0.46, hr=h*0.46;
  ctx.fillStyle=fur;
  ctx.beginPath();
  ctx.arc(hx, oy-h*0.06, hr, 0, Math.PI*2);
  ctx.fill();

  // Snout
  ctx.fillStyle=belly;
  ctx.beginPath();
  ctx.ellipse(hx+hr*0.72, oy-h*0.06, hr*0.42, hr*0.3, 0, 0, Math.PI*2);
  ctx.fill();

  // Nose
  ctx.fillStyle='#ff8888';
  ctx.beginPath();
  ctx.arc(hx+hr*0.97, oy-h*0.06, hr*0.12, 0, Math.PI*2);
  ctx.fill();

  // Eye
  ctx.fillStyle='#111';
  ctx.beginPath();
  ctx.arc(hx+hr*0.3, oy-h*0.28, hr*0.13, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle='#fff';
  ctx.beginPath();
  ctx.arc(hx+hr*0.34, oy-h*0.3, hr*0.055, 0, Math.PI*2);
  ctx.fill();

  // Ear
  ctx.fillStyle=fur;
  ctx.beginPath();
  ctx.arc(hx-hr*0.1, oy-h*0.5-hr*0.32, hr*0.28, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle='#e08888';
  ctx.beginPath();
  ctx.arc(hx-hr*0.1, oy-h*0.5-hr*0.32, hr*0.16, 0, Math.PI*2);
  ctx.fill();

  // Crown for Шнырь
  if(crown) {
    ctx.fillStyle='#ffcc00';
    ctx.beginPath();
    const cx2=hx-hr*0.1, cy2=oy-h*0.5-hr*0.62;
    ctx.moveTo(cx2-hr*0.5, cy2);
    ctx.lineTo(cx2-hr*0.38, cy2-hr*0.52);
    ctx.lineTo(cx2-hr*0.08, cy2-hr*0.3);
    ctx.lineTo(cx2+hr*0.22, cy2-hr*0.56);
    ctx.lineTo(cx2+hr*0.5, cy2-hr*0.08);
    ctx.lineTo(cx2+hr*0.5, cy2);
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle='#ff9900'; ctx.lineWidth=0.5; ctx.stroke();
    ctx.fillStyle='#ff2244';
    ctx.beginPath();
    ctx.arc(cx2-hr*0.08, cy2-hr*0.4, hr*0.09, 0, Math.PI*2);
    ctx.fill();
  }

  // Heart
  if(heart) {
    ctx.font=(h*0.55)+'px serif';
    ctx.fillText('💕', ox+w*0.1, oy-h*0.72);
  }
}

function drawRat(rat) {
  const {x, y, fur, belly, sz, facing, walkFrame, state, act, fat, crown, heart, blur, headphones, pinkMonitor} = rat;
  ctx.save();
  ctx.translate(px(x), y);
  if(facing<0) ctx.scale(-1,1);

  const bw=Math.round(22*sz), bh=Math.round(15*sz);

  // Blur trail (Шустрик)
  if(blur && rat.trail.length>0 && state==='walking'){
    rat.trail.forEach((t,i)=>{
      ctx.save();
      ctx.globalAlpha=(1-i/rat.trail.length)*0.28;
      ctx.translate(px(t.x)-px(x), 0);
      drawRatBody(0,0,bw,bh,fur,belly,false,false,false);
      ctx.restore();
    });
  }

  // Special: phone rat in bed
  if(state==='activity' && act==='sleep' && rat.phoneInBed) {
    ctx.save();
    ctx.rotate(-0.38); ctx.translate(0, 4*sz);
    drawRatBody(0,0,bw,bh,fur,belly,fat,crown,heart);
    // Phone glow
    ctx.shadowColor='rgba(150,200,255,0.8)'; ctx.shadowBlur=10;
    fr_local(-bw*0.7+px(x)-px(x), -bh*1.3, bw*0.7, bh*0.9, '#001122');
    ctx.shadowBlur=0;
    ctx.fillStyle='#0044aa'; ctx.font=Math.round(7*sz)+'px monospace';
    ctx.fillText('📱', bw*0.05, -bh*0.6);
    // Scroll animation
    const scrollY = (tick*0.5)%20;
    ctx.fillStyle='rgba(100,150,255,0.4)';
    ctx.fillRect(-bw*0.6, -bh*1.2+scrollY, bw*0.5, 4);
    ctx.fillRect(-bw*0.6, -bh*1.2+scrollY+8, bw*0.4, 3);
    ctx.restore();
    ctx.save();
    ctx.rotate(-0.38); ctx.translate(0,4*sz);
    ctx.restore();
    ctx.restore(); return;
  }

  function fr_local(lx,ly,lw,lh,c) {
    ctx.fillStyle=c; ctx.fillRect(lx,ly,lw,lh);
  }

  // Sleep pose
  if(state==='activity' && act==='sleep'){
    ctx.save(); ctx.rotate(-0.38); ctx.translate(0,4*sz);
    drawRatBody(0,0,bw,bh,fur,belly,fat,crown,heart);
    ctx.restore();
    ctx.fillStyle=`rgba(200,220,255,${0.5+Math.sin(tick*0.04)*0.3})`;
    ctx.font=Math.round(8*sz)+'px monospace';
    const zi=['z','zz','zzz'][Math.floor(tick/38)%3];
    const zfloat=-bh*1.5-(tick%38)*0.2;
    ctx.fillText(zi,bw*0.15,zfloat);
    ctx.restore(); return;
  }

  if(state==='activity' && act==='sex'){
    ctx.save(); ctx.scale(1,0.45);
    drawRatBody(0,0,bw,bh,fur,belly,false,false,false);
    ctx.restore(); ctx.restore(); return;
  }

  if(state==='activity' && act==='beer'){
    // Dance bob
    const bob = Math.sin(tick*0.18)*3;
    ctx.save(); ctx.translate(0, bob);
    ctx.save();
    ctx.translate(bw*0.45,-bh*0.4);
    ctx.rotate(Math.sin(tick*0.08)*0.3-0.5);
    ctx.fillStyle='#c8a000'; ctx.fillRect(-3,-18,7,18);
    ctx.fillStyle='#e8d000'; ctx.fillRect(-3,-24,7,7);
    ctx.restore();
    // Raised arm dance move
    ctx.save();
    ctx.translate(-bw*0.1, -bh*0.4);
    ctx.rotate(Math.sin(tick*0.18)*0.8 - 1.2);
    ctx.strokeStyle=fur; ctx.lineWidth=Math.round(3*sz);
    ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(0,-bh); ctx.stroke();
    ctx.restore();
    ctx.restore();
    // Music note above
    if(Math.floor(tick/15)%2===0) {
      ctx.fillStyle='rgba(255,200,50,0.8)';
      ctx.font=Math.round(10*sz)+'px serif';
      ctx.fillText('🎵',bw*0.2,-bh*2.5);
    }
  }

  // Default draw
  drawRatBody(0,0,bw,bh,fur,belly,fat,crown,heart);

  // Headphones (for Шнырь or headphones rats)
  if(headphones) {
    const hx2=bw*0.46, hr2=bh*0.46;
    ctx.strokeStyle='#222222'; ctx.lineWidth=Math.round(2.5*sz);
    ctx.beginPath();
    ctx.arc(hx2, -bh*0.06, hr2*1.1, -Math.PI*0.9, -Math.PI*0.1);
    ctx.stroke();
    ctx.fillStyle='#ff44aa';
    ctx.beginPath(); ctx.arc(hx2-hr2*1.05, -bh*0.06, hr2*0.3, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(hx2+hr2*1.05, -bh*0.06, hr2*0.3, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle='#222222';
    ctx.beginPath(); ctx.arc(hx2-hr2*1.05, -bh*0.06, hr2*0.2, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(hx2+hr2*1.05, -bh*0.06, hr2*0.2, 0, Math.PI*2); ctx.fill();
    // LED glow
    ctx.shadowColor='#ff44aa'; ctx.shadowBlur=6+Math.sin(tick*0.15)*3;
    ctx.fillStyle=`rgba(255,68,170,${0.6+Math.sin(tick*0.2)*0.3})`;
    ctx.beginPath(); ctx.arc(hx2-hr2*1.05, -bh*0.06, hr2*0.14, 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur=0;
    // Music notes floating up
    const noteIdx = Math.floor(tick*0.05)%4;
    const notes = ['♪','♫','♬','♩'];
    const notePhase = (tick * 0.03) % 1;
    ctx.fillStyle=`rgba(255,100,200,${0.8-notePhase*0.7})`;
    ctx.font=Math.round(9*sz)+'px serif';
    ctx.fillText(notes[noteIdx], hx2+hr2*1.2, -bh*1.2 - notePhase*bh*1.5);
    if(notePhase > 0.5) {
      ctx.fillStyle=`rgba(200,80,255,${0.8-(notePhase-0.5)*1.6})`;
      ctx.fillText(notes[(noteIdx+1)%4], hx2+hr2*0.8, -bh*1.8 - (notePhase-0.5)*bh*1.5);
    }
  }

  // Legs
  ctx.fillStyle=fur;
  if(state==='walking'){
    const lv=[0,1,0,-1][walkFrame]*3*sz;
    ctx.fillRect(-bw*0.3,bh*0.42,Math.round(5*sz),Math.round(7*sz)+lv);
    ctx.fillRect(bw*0.06,bh*0.42,Math.round(5*sz),Math.round(7*sz)-lv);
  } else {
    ctx.fillRect(-bw*0.3,bh*0.42,Math.round(5*sz),Math.round(7*sz));
    ctx.fillRect(bw*0.06,bh*0.42,Math.round(5*sz),Math.round(7*sz));
  }

  // Activity icons
  if(state==='activity' && act!=='idle'){
    const icons={typing:'⌨️',coffee:'☕',think:'💭',debug:'😤',commit:'🎉',gaming:'🎮',
      tv:'📺',eat_pizza:'🍕',beer:'🍺',shower:'💧',gym:'💪',sex:'💕',sleep:'😴',
      microwave:'🍕',toilet:'🚽',slot:'🎰'};
    if(icons[act]){ctx.font=Math.round(11*sz)+'px serif'; ctx.fillText(icons[act],0,-bh*1.9);}
    ctx.font=Math.round(8*sz)+'px monospace'; ctx.textAlign='center';
    if(act==='commit' && Math.floor(tick/28)%2===0){ctx.fillStyle='#ffcc44';ctx.fillText('PUSH!',0,-bh*2.8);}
    if(act==='debug' && Math.floor(tick/18)%2===0){ctx.fillStyle='#ff4444';ctx.fillText('WTF?!',0,-bh*2.8);}
    if(act==='think'){ctx.fillStyle='rgba(180,200,255,0.8)';ctx.fillText('???',0,-bh*2.8);}
    if(act==='typing') {
      if(Math.floor(tick/6)%2===0){ctx.fillStyle='#00aa44';ctx.fillText('// code...',0,-bh*2.6);}
      // Floating key letters
      if(tick%10===Math.floor(rat.x)%10) {
        rat.particles.push({
          x:rat.x+(Math.random()-0.5)*30, y:rat.y-bh*2,
          vx:(Math.random()-0.5)*0.8, vy:-0.8-Math.random()*0.5,
          color:'rgba(0,200,80,0.7)', life:40, size:7,
          isText:true, char:String.fromCharCode(65+Math.floor(Math.random()*26))
        });
      }
    }
    if(act==='slot' && slotSpinning){ctx.fillStyle='#ffcc00';ctx.fillText('ВЕЗЁТ!',0,-bh*2.8);}
    ctx.textAlign='left';
  }

  // Name tag
  ctx.fillStyle='rgba(200,225,255,0.55)';
  ctx.font=Math.round(8*sz)+'px monospace';
  ctx.textAlign='center'; ctx.fillText(rat.name,0,-bh*1.0-3); ctx.textAlign='left';

  ctx.restore();

  // Particles outside transform
  rat.particles.forEach(p=>{
    ctx.fillStyle=p.color;
    if(p.isHeart){ctx.font=p.size+'px serif';ctx.fillText('💕',px(p.x),p.y);}
    else if(p.isText){ctx.font='bold '+p.size+'px monospace';ctx.fillText(p.char,px(p.x),p.y);}
    else{ctx.shadowColor=p.color;ctx.shadowBlur=3;ctx.fillRect(px(p.x),p.y,p.size,p.size);ctx.shadowBlur=0;}
  });
}

// CHAT BUBBLES DRAW
// ═══════════════════════════════════════════════
function drawChatBubbles() {
  chatBubbles.forEach(b => {
    const alpha = Math.min(1, b.timer/30) * Math.min(1, (180-b.timer)/20);
    if(alpha <= 0) return;
    ctx.save();
    ctx.globalAlpha = alpha;
    const txt = b.msg;
    ctx.font='9px monospace';
    const tw = ctx.measureText(txt).width;
    const bw2 = tw + 16, bh2 = 18;
    const bx = px(b.x) - bw2/2;
    const by2 = b.y - 46 - (1 - b.timer/180)*20;
    // Bubble background
    ctx.fillStyle='rgba(20,30,60,0.92)';
    ctx.beginPath();
    ctx.roundRect(bx, by2, bw2, bh2, 4);
    ctx.fill();
    ctx.strokeStyle='rgba(80,130,220,0.8)'; ctx.lineWidth=1;
    ctx.stroke();
    // Tail
    ctx.fillStyle='rgba(20,30,60,0.92)';
    ctx.beginPath();
    ctx.moveTo(px(b.x)-4, by2+bh2);
    ctx.lineTo(px(b.x)+4, by2+bh2);
    ctx.lineTo(px(b.x), by2+bh2+7);
    ctx.closePath(); ctx.fill();
    // Text
    ctx.fillStyle='#ccddff'; ctx.font='9px monospace';
    ctx.fillText(txt, bx+8, by2+12);
    ctx.restore();
  });
}

// CLICK INTERACTIONS
// ═══════════════════════════════════════════════
function handleClick(wx, wy, sx, sy) {
  // Sprint board easter egg (PANIC MODE)
  if(wx >= 90 && wx <= 610 && wy >= oY(0.08) && wy <= FLOOR_Y) {
    const msgs = ['🔥 SPRINT FAILED! ВСЁ ГОРИТ', '💀 DEADLINE СЕГОДНЯ В 9:00', '🚨 BOSS ONLINE!', '⚡ ВСЕМ РАБОТАТЬ!'];
    showToast(msgs[Math.floor(Math.random()*msgs.length)], 100);
    // Make all office rats run to desks
    rats.filter(r=>r.zone==='office').forEach(r => {
      const deskSpots = SPOTS.filter(s=>s.act==='typing' && s.zone==='office');
      const sp = deskSpots[Math.floor(Math.random()*deskSpots.length)];
      r.tx = sp.x; r.ty = sp.y; r.state='walking';
    });
    return;
  }
  // Whiteboard easter egg
  if(wx >= 2700 && wx <= 2860 && wy >= oY(0.14) && wy <= FLOOR_Y) {
    const msgs = ['💡 ЭВРИКА!', '🤯 ЭТО ЖЕ ГЕНИАЛЬНО!', '✅ АРХИТЕКТУРА ГОТОВА', '❌ ВСЁ НАДО ПЕРЕДЕЛАТЬ'];
    showToast(msgs[Math.floor(Math.random()*msgs.length)], 80);
    return;
  }
  // Microwave
  if(wx >= 1200 && wx <= 1278 && wy >= DEN_Y && wy <= ch) {
    microwaveTimer = 180;
    showToast('🔔 Микроволновка включена!', 60);
    return;
  }
  // Slot machine lever
  if(wx >= 2290 && wx <= 2320 && wy >= DEN_Y && wy <= ch) {
    if(!slotSpinning) {
      slotSpinning = true; slotTick = 0; slotWin = false;
      setTimeout(() => {
        slotSpinning = false;
        slotReels = [Math.floor(Math.random()*SLOT_ITEMS.length),
                     Math.floor(Math.random()*SLOT_ITEMS.length),
                     Math.floor(Math.random()*SLOT_ITEMS.length)];
        slotWin = slotReels[0]===slotReels[1] && slotReels[1]===slotReels[2];
        if(slotWin) showToast('💰 ДЖЕКПОТ! ТЫ ВЫИГРАЛ!', 120);
      }, 2000);
    }
    return;
  }
  // TV
  if(wx >= 620 && wx <= 708 && wy >= DEN_Y && wy <= ch) {
    tvChannel = (tvChannel + 1) % 4;
    showToast('📺 Канал '+tvChannel, 40);
    return;
  }
  // Server rack
  if(wx >= 2640 && wx <= 2760 && wy >= 0 && wy <= FLOOR_Y) {
    const msgs = ['💚 Всё ОК', '🔥 CPU 99%!', '💀 DISK FULL!', '⚡ Restarting...'];
    showToast(msgs[Math.floor(Math.random()*msgs.length)], 80);
    serverBlip.push({x:2700+Math.random()*80, y:oY(0.3+Math.random()*0.4), life:40});
    return;
  }
  // Rat clicks
  let found = false;
  rats.forEach(r => {
    const hw = 26*r.sz, hh = 30*r.sz;
    if(wx>r.x-hw/2 && wx<r.x+hw/2 && wy>r.y-hh && wy<r.y+hh/2){
      showPopup(r, sx, sy); found = true;
    }
  });
  if(!found) popup.style.display='none';
}

// Touch support
let lastTouch = null, lastTouchDist = null;
let touchScale = 1.0; // future: zoom support

canvas.addEventListener('touchstart', e => {
  if(e.touches.length === 1) {
    lastTouch = {x: e.touches[0].clientX, y: e.touches[0].clientY};
  } else if(e.touches.length === 2) {
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    lastTouchDist = Math.sqrt(dx*dx+dy*dy);
  }
  e.preventDefault();
}, {passive:false});

canvas.addEventListener('touchmove', e => {
  if(e.touches.length === 1 && lastTouch) {
    const dx = lastTouch.x - e.touches[0].clientX;
    targetCamX = Math.max(0, Math.min(WORLD_W-cw, targetCamX + dx));
    lastTouch = {x: e.touches[0].clientX, y: e.touches[0].clientY};
  }
  e.preventDefault();
}, {passive:false});

canvas.addEventListener('touchend', e => {
  if(e.touches.length === 0) {
    // tap detection
    if(lastTouch && e.changedTouches.length > 0) {
      const t = e.changedTouches[0];
      const wx = t.clientX + camX, wy = t.clientY;
      handleClick(wx, wy, t.clientX, t.clientY);
    }
    lastTouch = null; lastTouchDist = null;
  }
});

  clockEl.textContent = (night ? '🌙' : '☀️') + ' UTC ' + h + ':' + m + ':' + s;

}

// MAIN LOOP
// ═══════════════════════════════════════════════
function loop(ts) {
  const dt = Math.min((ts - lastTime)/1000, 0.05);
  lastTime = ts; tick++;

  // Camera
  const scrollZone = cw * 0.16;
  const maxCam = Math.max(0, WORLD_W - cw);
  if(mouseClientX < scrollZone) targetCamX = Math.max(0, targetCamX - (scrollZone-mouseClientX)*0.06);
  else if(mouseClientX > cw-scrollZone) targetCamX = Math.min(maxCam, targetCamX + (mouseClientX-(cw-scrollZone))*0.06);
  // Auto-scroll on mobile (gentle auto-pan)
  if(autoScrollActive && lastTouch === null) {
    targetCamX += autoScrollDir * 0.5;
    if(targetCamX >= maxCam) { autoScrollDir=-1; }
    else if(targetCamX <= 0) { autoScrollDir=1; }
  }
  camX += (targetCamX-camX)*0.1;

  // Microwave countdown
  if(microwaveTimer > 0) microwaveTimer -= dt*60;

  // Slot machine
  if(slotSpinning) slotTick += dt*60;

  // Server blips
  serverBlip = serverBlip.filter(b => b.life-- > 0);

  // Update dust
  updateDust();

  // Update rats
  rats.forEach(r => {
    r.update(dt);
    if(r.state==='activity'){
      if(r.act==='commit' && tick%62===0) r.addConfetti();
      if(r.act==='shower' && tick%8===0) r.addWater();
      if(r.act==='sex' && tick%26===0) r.addHeart();
    }
  });

  // Chat bubbles
  nextChatIn--;
  if(nextChatIn <= 0) { spawnChat(); nextChatIn = 150 + Math.random()*250; }
  chatBubbles = chatBubbles.filter(b => b.timer-- > 0);
  chatBubbles.forEach(b => { b.x = b.rat.x; b.y = b.rat.y; });

  // Mini events
  nextEventIn--;
  if(nextEventIn <= 0) { triggerMiniEvent(); nextEventIn = 4000+Math.random()*6000; }
  miniEvents = miniEvents.filter(e => e.timer-- > 0);

  // Cat scare
  nextCatIn--;
  if(nextCatIn <= 0) {
    catScare = {x: WORLD_W+100, y: dY(0.6), timer: 400};
    nextCatIn = 10000 + Math.random()*15000;
  }
  if(catScare) {
    catScare.x -= 2.5;
    catScare.timer--;
    if(catScare.timer <= 0) catScare = null;
    // Scare nearby rats
    if(catScare) {
      rats.filter(r=>r.zone==='den' && Math.abs(r.x-catScare.x)<300).forEach(r => {
        if(Math.random()<0.05) {
          r.tx = Math.random()<0.5 ? r.x-200 : TUNNELS[0]+Math.random()*100;
          r.ty = r.y; r.state='walking';
        }
      });
    }
  }
  miniEvents.forEach(e => { if(e.type==='deliveroo'||e.type==='pizza_delivery') e.wx+=0.6; });

  // Toast timer
  if(toastTimer > 0) {
    toastTimer -= dt*60;
    if(toastTimer <= 0) toastEl.style.display='none';
  }

  // === DRAW ===
  drawBG();
  drawDen();
  drawOffice();

  // Server blip effects
  serverBlip.forEach(b => {
    ctx.fillStyle=`rgba(0,255,100,${b.life/40})`;
    ctx.beginPath(); ctx.arc(px(b.x), b.y, (40-b.life)*0.5, 0, Math.PI*2); ctx.fill();
  });

  // Dust particles
  drawDust();

  // Rats sorted by Y
  [...rats].sort((a,b2)=>a.y-b2.y).forEach(r=>drawRat(r));

  drawChatBubbles();
  drawMiniEvents();
  drawCatScare();
  drawMinimap();
  drawNewsTicker();

  requestAnimationFrame(loop);
}
