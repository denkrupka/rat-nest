let statusMap = {};
async function fetchStatus() {
  try {
    const r = await fetch('status.json?t=' + Date.now());

function randSpot(zone) {
  const s = SPOTS.filter(sp => sp.zone === zone);

// ════════════════════════════════════════════════════
// RAT CLASS
// ════════════════════════════════════════════════════
class Rat {
  constructor(d) {
    this.id = d.id; this.name = d.name;
    this.fur = d.fur; this.belly = d.belly;
    this.sz = d.sz; this.spd = d.spd;
    this.crown = d.crown; this.heart = d.heart;
    this.fat = d.fat; this.blur = d.blur;
    this.zone = d.zone;
    const sp = randSpot(this.zone);
    this.x = sp.x + Math.random()*40-20;
    this.y = sp.y + Math.random()*30-15;
    this.tx = this.x; this.ty = this.y;
    this.currentSpot = sp;
    this.state = 'activity';
    this.act = sp.act;
    this.actTimer = Math.random() * 300 + 120;
    this.walkFrame = 0; this.walkTick = 0;
    this.facing = 1;
    this.trail = [];
    this.particles = [];
  }

  pickTarget() {
    const sp = randSpot(this.zone);
    this.tx = sp.x + Math.random()*20-10;
    this.ty = sp.y + Math.random()*16-8;
    this.currentSpot = sp;
    this.state = 'walking';
    this.actTimer = 200 + Math.random() * 400;
  }

  update(dt) {
    if (this.state === 'walking') {
      const dx = this.tx - this.x, dy = this.ty - this.y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist < 3) {
        this.x = this.tx; this.y = this.ty;
        this.state = 'activity';
        this.act = this.currentSpot ? this.currentSpot.act : 'idle';
      } else {
        const s = this.spd * dt * 60;
        this.facing = dx >= 0 ? 1 : -1;
        this.x += (dx/dist)*s; this.y += (dy/dist)*s;
        this.walkTick += s * 0.22;
        this.walkFrame = Math.floor(this.walkTick % 4);
        if (this.blur) {
          this.trail.unshift({x:this.x, y:this.y});
          if (this.trail.length > 7) this.trail.pop();
        }
      }
    } else {
      this.trail = [];
      this.actTimer -= dt * 60;
      if (this.actTimer <= 0) this.pickTarget();
    }
    // particles
    this.particles = this.particles.filter(p => p.life > 0);
    this.particles.forEach(p => {
      p.x += p.vx * dt * 60; p.y += p.vy * dt * 60;
      p.vy += 0.05 * dt * 60; p.life -= dt * 60;
    });
  }

  addConfetti() {
    for (let i = 0; i < 14; i++) {
      this.particles.push({
        x:this.x, y:this.y-20,
        vx:(Math.random()-0.5)*3, vy:-Math.random()*3-1,
        color:['#ff4','#f4f','#4ff','#f84','#8f4'][Math.floor(Math.random()*5)],
        life:70, size:3+Math.random()*3, isRect:true
      });
    }
  }

  addHeart() {
    this.particles.push({
      x:this.x + Math.random()*36-18, y:this.y-32-Math.random()*10,
      vx:(Math.random()-0.5)*0.8, vy:-0.6-Math.random()*0.5,
      color:'#ff6699', life:90, size:12, isHeart:true
    });
  }

  addWater() {
    for (let i = 0; i < 3; i++) {
      this.particles.push({
        x:this.x+Math.random()*18-9, y:this.y-12+Math.random()*8,
        vx:(Math.random()-0.5)*1.8, vy:-Math.random()*2-0.5,
        color:'#88ccff', life:22, size:2, isRect:true
      });
    }
  }
}

// ════════════════════════════════════════════════════
// DRAW HELPERS
// ════════════════════════════════════════════════════
function px(x) { return x - camX; }
function py(y) { return y; }

function fr(x,y,w,h,c) { ctx.fillStyle=c; ctx.fillRect(px(x),y,w,h); }
function sr(x,y,w,h,c,lw=1) { ctx.strokeStyle=c; ctx.lineWidth=lw; ctx.strokeRect(px(x)+0.5,y+0.5,w-1,h-1); }
function tx(t,x,y,c,sz=10,al='left') { ctx.fillStyle=c; ctx.font=sz+'px monospace'; ctx.textAlign=al; ctx.fillText(t,px(x),y); ctx.textAlign='left'; }
function em(e,x,y,sz=14) { ctx.font=sz+'px serif'; ctx.fillText(e,px(x),y); }

// ════════════════════════════════════════════════════
// BACKGROUND
// ════════════════════════════════════════════════════
function drawBG() {
  ctx.fillStyle='#050508'; ctx.fillRect(0,0,cw,ch);

  // DEN floor warm
  fr(0,0,1150,WORLD_H,'#180d06');
  ctx.strokeStyle='#1e1008'; ctx.lineWidth=1;
  for(let y=0;y<WORLD_H;y+=28){ctx.beginPath();ctx.moveTo(px(0),y);ctx.lineTo(px(1150),y);ctx.stroke();}
  for(let x=0;x<1150;x+=80){ctx.beginPath();ctx.moveTo(px(x+(Math.floor(x/80)%2)*40),0);ctx.lineTo(px(x+(Math.floor(x/80)%2)*40),WORLD_H);ctx.stroke();}

  // Warm DEN ambient
  const g1=ctx.createRadialGradient(px(350),480,50,px(350),480,650);
  g1.addColorStop(0,'rgba(255,130,20,0.09)');g1.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=g1; ctx.fillRect(px(0),0,1150,WORLD_H);

  // WALL
  fr(1150,0,100,WORLD_H,'#0d0d0d');
  ctx.fillStyle='#111';
  for(let wy=0;wy<WORLD_H;wy+=20)
    for(let wx=0;wx<100;wx+=40){
      const off=(Math.floor(wy/20)%2)*20;
      ctx.fillRect(px(1150+wx+off)+1,wy+1,38,18);
    }

  // OFFICE floor cold
  fr(1250,0,WORLD_W-1250,WORLD_H,'#080810');
  ctx.strokeStyle='#0c0c1c'; ctx.lineWidth=1;
  for(let y=0;y<WORLD_H;y+=40){ctx.beginPath();ctx.moveTo(px(1250),y);ctx.lineTo(px(WORLD_W),y);ctx.stroke();}
  for(let x=1250;x<WORLD_W;x+=40){ctx.beginPath();ctx.moveTo(px(x),0);ctx.lineTo(px(x),WORLD_H);ctx.stroke();}

  // Cold OFFICE ambient
  const g2=ctx.createRadialGradient(px(2100),400,100,px(2100),400,900);
  g2.addColorStop(0,'rgba(20,50,180,0.07)');g2.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=g2; ctx.fillRect(px(1250),0,WORLD_W-1250,WORLD_H);

  // Ceilings
  fr(0,0,1150,55,'#0e0602'); fr(1250,0,WORLD_W-1250,55,'#070710');

  // Cables
  ctx.lineWidth=2;
  [[50,810,400,820,'#2d1500'],[200,840,700,850,'#2d1500'],[900,820,1100,835,'#2d1500'],
   [1300,755,1800,770,'#141428'],[1900,745,2450,762,'#141428']].forEach(([x1,y1,x2,y2,c])=>{
    ctx.strokeStyle=c; ctx.beginPath();
    ctx.moveTo(px(x1),y1);
    ctx.bezierCurveTo(px((x1+x2)/2),y1-15,px((x1+x2)/2),y2+15,px(x2),y2);
    ctx.stroke();
  });

  // Cobwebs
  [[30,25],[1100,25],[1270,25],[3150,25]].forEach(([x,y])=>cobweb(x,y));

  // Cheese
  em('🧀',160,765,11); em('🧀',655,700,10); em('🧀',1010,740,11);
}

function cobweb(x,y) {
  ctx.strokeStyle='rgba(180,180,180,0.18)'; ctx.lineWidth=0.5;
  for(let i=0;i<5;i++){
    ctx.beginPath(); ctx.moveTo(px(x),y);
    ctx.lineTo(px(x+45*Math.cos(i*0.55)),y+45*Math.sin(i*0.55)); ctx.stroke();
  }
  for(let r=8;r<=44;r+=10){
    ctx.beginPath();
    for(let a=0;a<=Math.PI*2;a+=0.35){
      const cx2=x+r*Math.cos(a),cy2=y+r*Math.sin(a);
      a===0?ctx.moveTo(px(cx2),cy2):ctx.lineTo(px(cx2),cy2);
    } ctx.stroke();
  }
}

function bed(x,y,special) {
  fr(x,y,112,82,'#3d1e10'); sr(x,y,112,82,'#5a2e18',2);

  const bs = special ? '#ff6688' : '#4466bb';
  const bob = special ? Math.sin(tick*0.16)*4 : 0;
  fr(x+8,y+36+bob,96,36-bob*0.5,bc); sr(x+8,y+36+bob,96,36-bob*0.5,bs,1);
  fr(x,y-13,112,15,'#5a2e18'); sr(x,y-13,112,15,'#7a4e38',1);
  if(special){ em('💕',x+50,y+28,10); }
}

  const tvC=['#000d22','#000d28','#001133'][Math.floor(tick/18)%3];

  fr(x+4,y+4,72,57,tvC); ctx.shadowBlur=0;
  ctx.strokeStyle='rgba(255,255,255,0.04)'; ctx.lineWidth=1;

// ════════════════════════════════════════════════════
// RAT DRAWING
// ════════════════════════════════════════════════════
function drawRatBody(ox,oy,bw,bh,fur,belly,fat,crown,heart) {
  const xw=fat?bw*0.3:0, xh=fat?bh*0.25:0;
  const w=bw+xw, h=bh+xh;

  // Tail
  ctx.strokeStyle=fur; ctx.lineWidth=Math.max(1.5,h*0.11);
  ctx.beginPath();
  ctx.moveTo(ox-w/2+2,oy+h*0.3);
  ctx.bezierCurveTo(ox-w,oy+h*0.6,ox-w*1.4,oy+h*0.9,ox-w*1.1,oy+h*1.15);
  ctx.stroke();

  // Body
  ctx.fillStyle=fur; ctx.beginPath();
  ctx.ellipse(ox,oy,w/2,h/2,0,0,Math.PI*2); ctx.fill();

  // Belly
  ctx.fillStyle=belly; ctx.beginPath();
  ctx.ellipse(ox+w*0.05,oy+h*0.05,w*0.28,h*0.28,0,0,Math.PI*2); ctx.fill();

  // Head
  const hx=ox+w*0.45, hr=h*0.46;
  ctx.fillStyle=fur; ctx.beginPath();
  ctx.arc(hx,oy-h*0.06,hr,0,Math.PI*2); ctx.fill();

  // Snout
  ctx.fillStyle=belly; ctx.beginPath();
  ctx.ellipse(hx+hr*0.7,oy-h*0.06,hr*0.42,hr*0.3,0,0,Math.PI*2); ctx.fill();

  // Nose
  ctx.fillStyle='#ff8888'; ctx.beginPath();
  ctx.arc(hx+hr*0.95,oy-h*0.06,hr*0.12,0,Math.PI*2); ctx.fill();

  // Eye
  ctx.fillStyle='#111'; ctx.beginPath();
  ctx.arc(hx+hr*0.3,oy-h*0.28,hr*0.12,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#fff'; ctx.beginPath();
  ctx.arc(hx+hr*0.34,oy-h*0.3,hr*0.05,0,Math.PI*2); ctx.fill();

  // Ear
  ctx.fillStyle=fur; ctx.beginPath();
  ctx.arc(hx-hr*0.12,oy-h*0.5-hr*0.32,hr*0.28,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#e08888'; ctx.beginPath();
  ctx.arc(hx-hr*0.12,oy-h*0.5-hr*0.32,hr*0.16,0,Math.PI*2); ctx.fill();

  // Crown
  if(crown){
    ctx.fillStyle='#ffcc00';
    ctx.beginPath();
    const cx2=hx-hr*0.12, cy2=oy-h*0.5-hr*0.62;
    ctx.moveTo(cx2-hr*0.5,cy2); ctx.lineTo(cx2-hr*0.38,cy2-hr*0.52);
    ctx.lineTo(cx2-hr*0.08,cy2-hr*0.3); ctx.lineTo(cx2+hr*0.22,cy2-hr*0.56);
    ctx.lineTo(cx2+hr*0.5,cy2-hr*0.08); ctx.lineTo(cx2+hr*0.5,cy2);
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle='#ff9900'; ctx.lineWidth=0.5; ctx.stroke();
    ctx.fillStyle='#ff2244'; ctx.beginPath();
    ctx.arc(cx2-hr*0.08,cy2-hr*0.4,hr*0.09,0,Math.PI*2); ctx.fill();
  }

  // Heart icon for Pysklia
  if(heart){
    ctx.font=(h*0.55)+'px serif';
    ctx.fillText('💕',ox+w*0.1,oy-h*0.72);
  }
}

function drawRat(rat) {
  const {x,y,fur,belly,sz,facing,walkFrame,state,act,fat,crown,heart,blur} = rat;
  ctx.save();
  ctx.translate(px(x),py(y));
  if(facing<0) ctx.scale(-1,1);

  const bw=Math.round(22*sz), bh=Math.round(15*sz);

  // Blur trail for Shustrik
  if(blur && rat.trail.length>0 && state==='walking'){
    rat.trail.forEach((t,i)=>{
      ctx.save();
      ctx.globalAlpha=(1-i/rat.trail.length)*0.28;
      ctx.translate(px(t.x)-px(x),0);
      drawRatBody(0,0,bw,bh,fur,belly,false,false,false);
      ctx.restore();
    });
  }

  // Special activity poses
  if(state==='activity'){
    if(act==='sleep'){
      ctx.save(); ctx.rotate(-0.38); ctx.translate(0,4*sz);
      drawRatBody(0,0,bw,bh,fur,belly,fat,crown,heart);
      ctx.restore();
      ctx.fillStyle=`rgba(200,220,255,${0.5+Math.sin(tick*0.04)*0.3})`;
      ctx.font=Math.round(8*sz)+'px monospace';
      const zi=['z','zz','zzz'][Math.floor(tick/38)%3];
      const zfloat=-bh*1.5-(tick%38)*0.2;
      ctx.fillText(zi,bw*0.15,zfloat);
      ctx.restore(); return;
    }
    if(act==='sex'){
      ctx.save(); ctx.scale(1,0.45);
      drawRatBody(0,0,bw,bh,fur,belly,false,false,false);
      ctx.restore(); ctx.restore(); return;
    }
    if(act==='beer'){
      // Arm with beer
      ctx.save();
      ctx.translate(bw*0.45,-bh*0.4);
      ctx.rotate(Math.sin(tick*0.08)*0.3-0.5);
      ctx.fillStyle='#c8a000'; ctx.fillRect(-3,-18,7,18);
      ctx.fillStyle='#e8d000'; ctx.fillRect(-3,-24,7,7);
      ctx.restore();
      ctx.save(); ctx.rotate(Math.sin(tick*0.06)*0.1);
      drawRatBody(0,0,bw,bh,fur,belly,fat,crown,heart);
      ctx.restore(); ctx.restore(); return;
    }
    if(act==='gym'){
      ctx.save(); ctx.scale(1,0.88); ctx.translate(0,bh*0.06);
      drawRatBody(0,0,bw,bh,fur,belly,fat,crown,heart);
      ctx.restore(); ctx.restore(); return;
    }
    if(act==='shower'){
      drawRatBody(0,0,bw,bh,fur,belly,fat,crown,heart);
      ctx.fillStyle='rgba(100,190,255,0.14)';
      ctx.fillRect(-bw/2,-bh*1.3,bw+6,bh*1.7);
      ctx.restore(); return;
    }
  }

  // Default draw
  drawRatBody(0,0,bw,bh,fur,belly,fat,crown,heart);

  // Legs
  ctx.fillStyle=fur;
  if(state==='walking'){
    const lv=[0,1,0,-1][walkFrame]*3*sz;
    ctx.fillRect(-bw*0.3,bh*0.42,Math.round(5*sz),Math.round(7*sz)+lv);
    ctx.fillRect(bw*0.06,bh*0.42,Math.round(5*sz),Math.round(7*sz)-lv);
  } else {
    ctx.fillRect(-bw*0.3,bh*0.42,Math.round(5*sz),Math.round(7*sz));
    ctx.fillRect(bw*0.06,bh*0.42,Math.round(5*sz),Math.round(7*sz));
  }

  // Activity icons + labels
  if(state==='activity' && act!=='idle'){
    const icons={typing:'⌨️',coffee:'☕',think:'💭',debug:'😤',commit:'🎉',gaming:'🎮',tv:'📺',eat_pizza:'🍕',beer:'🍺',shower:'💧',gym:'💪',sex:'💕',sleep:'😴'};
    if(icons[act]){ctx.font=Math.round(11*sz)+'px serif'; ctx.fillText(icons[act],0,-bh*1.9);}
    ctx.font=Math.round(8*sz)+'px monospace'; ctx.textAlign='center';
    if(act==='commit' && Math.floor(tick/28)%2===0){ctx.fillStyle='#ffcc44';ctx.fillText('PUSH!',0,-bh*2.8);}
    if(act==='debug' && Math.floor(tick/18)%2===0){ctx.fillStyle='#ff4444';ctx.fillText('WTF?!',0,-bh*2.8);}
    if(act==='think'){ctx.fillStyle='rgba(180,200,255,0.8)';ctx.fillText('???',0,-bh*2.8);}
    if(act==='typing' && Math.floor(tick/6)%2===0){ctx.fillStyle='#00aa44';ctx.fillText('// code...',0,-bh*2.6);}
    ctx.textAlign='left';
  }

  // Name tag
  ctx.fillStyle='rgba(200,225,255,0.55)';
  ctx.font=Math.round(8*sz)+'px monospace';
  ctx.textAlign='center'; ctx.fillText(rat.name,0,-bh*1.0-3); ctx.textAlign='left';

  ctx.restore();

  // Draw particles outside translate
  rat.particles.forEach(p=>{
    ctx.fillStyle=p.color;
    if(p.isHeart){ctx.font=p.size+'px serif';ctx.fillText('💕',px(p.x),py(p.y));}
    else{ctx.shadowColor=p.color;ctx.shadowBlur=3;ctx.fillRect(px(p.x),py(p.y),p.size,p.size);ctx.shadowBlur=0;}
  });
}

  const sx=mw/WORLD_W, sy=mh/WORLD_H;
  mctx.fillStyle='#050508'; mctx.fillRect(0,0,mw,mh);
  mctx.fillStyle='#180d06'; mctx.fillRect(0,0,1150*sx,mh);
  mctx.fillStyle='#080810'; mctx.fillRect(1250*sx,0,(WORLD_W-1250)*sx,mh);
  mctx.fillStyle='#0d0d0d'; mctx.fillRect(1150*sx,0,100*sx,mh);
  rats.forEach(r=>{
    mctx.fillStyle=r.fur;

// ════════════════════════════════════════════════════
// POPUP
// ════════════════════════════════════════════════════
const popup = document.getElementById('popup');

function showPopup(rat, sx, sy) {
  const d = statusMap[rat.id] || {};
  document.getElementById('pname').textContent = d.name || rat.name;
  document.getElementById('prole').textContent = d.role || rat.id;
  const st = d.status || 'idle';
  const dot = document.getElementById('pdot');
  dot.className = 'pdot s-' + st;
  document.getElementById('pstatus').textContent = st.toUpperCase();
  document.getElementById('ptask').textContent = d.task || '—';
  document.getElementById('pmodel').textContent = d.model || '—';
  document.getElementById('pcommit').textContent = d.lastCommit || '—';
  document.getElementById('pcommits').textContent = (d.commits||0)+' commits';
  document.getElementById('puptime').textContent = d.uptime || '—';
  popup.style.display = 'block';
  popup.style.left = Math.min(sx+16, window.innerWidth-315)+'px';
  popup.style.top = Math.min(sy-8, window.innerHeight-210)+'px';
}

canvas.addEventListener('click', e => {
  const mx = e.clientX + camX, my = e.clientY;
  let found = false;
  rats.forEach(r => {
    const hw = 26*r.sz, hh = 30*r.sz;
    if(mx>r.x-hw/2 && mx<r.x+hw/2 && my>r.y-hh/2 && my<r.y+hh){
      showPopup(r, e.clientX, e.clientY);
      found = true;
    }
  });
  if(!found) popup.style.display='none';
});

canvas.addEventListener('mousemove', e => { mouseClientX = e.clientX; });

// ════════════════════════════════════════════════════
// MAIN LOOP
// ════════════════════════════════════════════════════
let lastTime = 0;

function loop(ts) {
  const dt = Math.min((ts - lastTime)/1000, 0.05);
  lastTime = ts; tick++;

  // Camera scroll
  const sz = cw * 0.18;
  const maxCam = Math.max(0, WORLD_W - cw);
  if(mouseClientX < sz) targetCamX = Math.max(0, targetCamX - (sz-mouseClientX)*0.065);
  else if(mouseClientX > cw-sz) targetCamX = Math.min(maxCam, targetCamX + (mouseClientX-(cw-sz))*0.065);
  camX += (targetCamX-camX)*0.1;

  // Update rats
  rats.forEach(r => {
    r.update(dt);
    if(r.state==='activity'){
      if(r.act==='commit' && tick%62===0) r.addConfetti();
      if(r.act==='shower' && tick%8===0) r.addWater();
      if(r.act==='sex' && tick%26===0) r.addHeart();
    }
  });

  // Mini events
  nextEventIn--;
  if(nextEventIn<=0){ triggerMiniEvent(); nextEventIn=3800+Math.random()*7400; }
  miniEvents=miniEvents.filter(e=>e.timer-->0);
  miniEvents.forEach(e=>{ if(e.type==='deliveroo') e.wx+=0.55; });

  // === DRAW ===
  drawBG();
  drawDen();
  drawOffice();

  // Rats sorted by Y (depth)
  [...rats].sort((a,b)=>a.y-b.y).forEach(r=>drawRat(r));

  drawMiniEvents();
  drawMinimap();

  requestAnimationFrame(loop);
}

requestAnimationFrame(ts => { lastTime=ts; requestAnimationFrame(loop); });
